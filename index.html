<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Datum</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
* { box-sizing: border-box; }
html, body { background: #000; margin: 0; height: 100%; }
body { font-family: 'Inter', -apple-system, sans-serif; }
button, input { font-family: inherit; }
button { cursor: pointer; border: none; background: none; }

.app-shell { width: 100%; max-width: 28rem; margin: 0 auto; height: 100vh; max-height: 800px; background: #000; display: flex; flex-direction: column; border-radius: 1.5rem; overflow: hidden; border: 1px solid #27272a; }
.app-body { flex: 1 1 0%; overflow-y: auto; padding: 1rem 1.25rem; }

.header { padding: 1.5rem 1.25rem 0.75rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #27272a; }
.brand { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; letter-spacing: 0.1em; color: #a3e635; font-weight: 700; text-transform: uppercase; }
.page-title { font-family: 'Archivo Black', 'Inter', sans-serif; font-size: 1.25rem; color: #fff; text-transform: uppercase; letter-spacing: -0.025em; }

.row { display: flex; align-items: center; }
.row-between { display: flex; align-items: center; justify-content: space-between; }
.gap-1-5 { gap: 0.375rem; }
.gap-2 { gap: 0.5rem; }
.mb-0-5 { margin-bottom: 0.125rem; }
.mb-1 { margin-bottom: 0.25rem; }
.mb-2 { margin-bottom: 0.5rem; }
.mb-3 { margin-bottom: 0.75rem; }
.mb-4 { margin-bottom: 1rem; }
.mt-1 { margin-top: 0.25rem; }
.mt-2 { margin-top: 0.5rem; }
.mt-5 { margin-top: 1.25rem; }

.icon-btn { width: 2.25rem; height: 2.25rem; border-radius: 9999px; background: #18181b; border: 1px solid #3f3f46; color: #e4e4e7; display: flex; align-items: center; justify-content: center; }

.card { background: #18181b; border-radius: 1rem; padding: 1rem; border: 1px solid #27272a; }
.card.center { text-align: center; }
.card-title { font-weight: 700; color: #fff; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.025em; }
.text-lime { color: #a3e635; }
.text-orange { color: #fb923c; }

.label-sm { font-size: 0.75rem; font-weight: 600; color: #d4d4d8; text-transform: uppercase; letter-spacing: 0.025em; }
.value-mono { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: #a1a1aa; }
.value-mono-bold { font-family: 'JetBrains Mono', monospace; font-size: 0.875rem; font-weight: 700; color: #fff; }
.hint { font-size: 0.8125rem; color: #71717a; }
.empty-state { text-align: center; color: #71717a; font-size: 0.875rem; margin-top: 2rem; margin-bottom: 1rem; }

.btn-primary { width: 100%; background: #a3e635; color: #000; border-radius: 0.75rem; padding: 0.75rem; font-weight: 700; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.025em; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
.btn-primary:disabled { background: #3f3f46; color: #71717a; }

.list-btn { width: 100%; text-align: left; background: #27272a; border: 1px solid #3f3f46; border-radius: 0.75rem; padding: 0.875rem 1rem; margin-bottom: 0.5rem; color: #fff; font-weight: 600; }
.back-link { color: #a3e635; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 0.75rem; display: inline-block; }

.segmented { display: flex; background: #27272a; border-radius: 0.75rem; padding: 0.25rem; margin-bottom: 1rem; border: 1px solid #3f3f46; }
.segmented-btn { flex: 1 1 0%; padding: 0.5rem; border-radius: 0.5rem; font-size: 0.875rem; font-weight: 700; color: #d4d4d8; text-align: center; }
.segmented-btn-active { background: #a3e635; color: #000; }

.scroll-list { max-height: 18rem; overflow-y: auto; }
.quick-item { width: 100%; text-align: left; padding: 0.625rem 0; border-top: 1px solid #27272a; }
.quick-item:first-child { border-top: none; }
.quick-item-title { font-size: 0.875rem; font-weight: 600; color: #fff; }
.quick-item-sub { font-size: 0.75rem; color: #a1a1aa; }

.scan-box { text-align: center; padding: 1rem 0; }
.scanning-text { color: #a3e635; font-family: 'JetBrains Mono', monospace; font-size: 0.875rem; letter-spacing: 0.1em; }
.scan-btn { width: 100%; background: #27272a; border: 1px solid #52525b; border-radius: 0.75rem; padding: 0.875rem; margin-bottom: 0.625rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; color: #fff; font-weight: 600; font-size: 0.875rem; }

.field-label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #a1a1aa; font-weight: 600; }
.field-input { width: 100%; background: #fff; border: 2px solid #d4d4d8; border-radius: 0.75rem; padding: 0.625rem 0.75rem; font-size: 1rem; color: #000; font-weight: 500; outline: none; margin-top: 0.25rem; }
.field-input:focus { border-color: #84cc16; }
.field-input::placeholder { color: #a1a1aa; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 1rem; }
.modal-box { background: #18181b; width: 100%; max-width: 28rem; border-radius: 1.5rem; max-height: 100%; overflow-y: auto; border: 1px solid #3f3f46; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.25rem 0.75rem; position: sticky; top: 0; background: #18181b; border-bottom: 1px solid #3f3f46; }
.modal-title { font-weight: 700; font-size: 1.125rem; color: #fff; text-transform: uppercase; letter-spacing: 0.025em; margin: 0; }
.modal-body { padding: 1.25rem; }

.progress-track { height: 0.5rem; background: #27272a; border-radius: 9999px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 9999px; transition: width 0.2s ease; }

.workout-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-top: 1px solid #27272a; }
.workout-row:first-child { border-top: none; }
.item-title { font-size: 0.875rem; color: #fff; font-weight: 500; }
.item-title-bold { font-size: 0.875rem; color: #fff; font-weight: 700; }

.food-row { display: flex; justify-content: space-between; padding: 0.625rem 0; border-top: 1px solid #27272a; }

.counter-card { background: #18181b; border-radius: 1.5rem; padding: 1.5rem; text-align: center; margin-bottom: 1rem; border: 1px solid #27272a; }
.counter-number { font-family: 'JetBrains Mono', monospace; font-size: 3rem; font-weight: 700; color: #a3e635; line-height: 1; }
.counter-goal { font-size: 1.5rem; color: #71717a; }
.counter-label { font-size: 0.75rem; color: #a1a1aa; margin-top: 0.25rem; text-transform: uppercase; letter-spacing: 0.1em; }
.big-number { font-family: 'JetBrains Mono', monospace; font-size: 2.25rem; font-weight: 700; color: #a3e635; }

.stat-box { flex: 1 1 0%; background: #18181b; border-radius: 0.75rem; padding: 0.75rem; text-align: center; border: 1px solid #27272a; }
.stat-num { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 1.125rem; color: #fff; }

.weight-input { flex: 1 1 0%; background: #fff; border: 2px solid #d4d4d8; border-radius: 0.75rem; padding: 0.75rem; font-size: 0.875rem; color: #000; font-weight: 500; outline: none; }
.weight-input:focus { border-color: #84cc16; }
.weight-input::placeholder { color: #a1a1aa; }
.log-btn { background: #a3e635; color: #000; border-radius: 0.75rem; padding: 0 1.25rem; font-weight: 700; font-size: 0.875rem; text-transform: uppercase; }
.weight-row { display: flex; justify-content: space-between; background: #18181b; border-radius: 0.75rem; padding: 0.75rem 1rem; margin-bottom: 0.375rem; border: 1px solid #27272a; }

.tabbar { display: flex; border-top: 1px solid #27272a; background: #000; }
.tab-btn { flex: 1 1 0%; padding: 0.75rem 0; display: flex; flex-direction: column; align-items: center; gap: 0.25rem; color: #71717a; }
.tab-btn-active { color: #a3e635; }
.tab-label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.025em; }

.summary-item { background: #27272a; border-radius: 0.75rem; padding: 0.75rem; margin-bottom: 0.5rem; font-size: 0.875rem; }
.summary-title { color: #fff; font-weight: 600; margin-bottom: 0.25rem; }
.summary-line { color: #a1a1aa; font-size: 0.75rem; }

@keyframes spin { to { transform: rotate(360deg); } }
.animate-spin { animation: spin 1.4s linear infinite; }

</style>
</head>
<body>
<div id="root">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#71717a;font-family:monospace;font-size:13px;">Loading…</div>
</div>
<script>
  window.onerror = function (msg, url, line, col, err) {
    document.getElementById("root").innerHTML =
      '<pre style="color:#f87171;background:#18181b;padding:20px;white-space:pre-wrap;font-family:monospace;font-size:12px;border-radius:12px;margin:16px;">' +
      "Error: " + String(msg) + "\nLine " + line + ", Col " + col + "\n\n" + (err && err.stack ? err.stack : "") +
      "</pre>";
  };
</script>
<script>
  // Try several CDNs in sequence for React + ReactDOM, since some
  // networks/firewalls block specific hosts (e.g. unpkg.com) but not
  // others. Only calls initDatumApp() once both libraries are
  // confirmed loaded; shows a clear message if every source fails.
  var CDN_SOURCES = [
    { react: "https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js",
      reactDom: "https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js",
      name: "cdnjs" },
    { react: "https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js",
      reactDom: "https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js",
      name: "jsdelivr" },
    { react: "https://unpkg.com/react@18/umd/react.production.min.js",
      reactDom: "https://unpkg.com/react-dom@18/umd/react-dom.production.min.js",
      name: "unpkg" }
  ];

  function loadScript(src) {
    return new Promise(function (resolve, reject) {
      var s = document.createElement("script");
      s.src = src;
      s.crossOrigin = "anonymous";
      s.onload = resolve;
      s.onerror = function () { reject(new Error("failed to load " + src)); };
      document.head.appendChild(s);
    });
  }

  function tryLoadFrom(sourceIndex) {
    if (sourceIndex >= CDN_SOURCES.length) {
      document.getElementById("root").innerHTML =
        '<pre style="color:#f87171;background:#18181b;padding:20px;white-space:pre-wrap;font-family:monospace;font-size:12px;border-radius:12px;margin:16px;">' +
        "Couldn't load React from any CDN (tried cdnjs, jsdelivr, unpkg).\n\n" +
        "This points to a network-level block on your connection rather than one specific site. Try switching networks (e.g. mobile data instead of wifi), disabling any content/ad/privacy blocker for this page, or opening this file once it's actually hosted online." +
        "</pre>";
      return;
    }
    var src = CDN_SOURCES[sourceIndex];
    loadScript(src.react)
      .then(function () { return loadScript(src.reactDom); })
      .then(function () {
        if (typeof React === "undefined" || typeof ReactDOM === "undefined") {
          throw new Error("loaded but globals missing from " + src.name);
        }
        initDatumApp();
      })
      .catch(function () { tryLoadFrom(sourceIndex + 1); });
  }
</script>
<script>
function initDatumApp() {
// ============================================================
// Datum — plain JS (no JSX/Babel) React app.
// Storage: uses real localStorage when available (e.g. hosted on
// GitHub Pages); silently falls back to an in-memory store when
// localStorage is blocked (e.g. inside a sandboxed preview), so
// the app still works there for testing, it just won't persist
// between reloads in that specific context.
// ============================================================
"use strict";

var h = React.createElement;
var useState = React.useState;
var useMemo = React.useMemo;
var useEffect = React.useEffect;
var useRef = React.useRef;

// ---------- storage ----------
var STORAGE_PREFIX = "datum:";
var memoryStore = {};
var useRealStorage = true;
try {
  var testKey = "__datum_test__";
  window.localStorage.setItem(testKey, "1");
  window.localStorage.removeItem(testKey);
} catch (e) {
  useRealStorage = false;
}
function loadKey(key, fallback) {
  try {
    if (useRealStorage) {
      var raw = window.localStorage.getItem(STORAGE_PREFIX + key);
      return raw ? JSON.parse(raw) : fallback;
    }
    return Object.prototype.hasOwnProperty.call(memoryStore, key)
      ? JSON.parse(JSON.stringify(memoryStore[key]))
      : fallback;
  } catch (e) {
    return fallback;
  }
}
function saveKey(key, value) {
  try {
    if (useRealStorage) {
      window.localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(value));
    } else {
      memoryStore[key] = value;
    }
  } catch (e) {}
}

// ---------- date / unit helpers ----------
var KG_PER_LB = 0.453592;
function toKg(val, unit) { return unit === "kg" ? val : val * KG_PER_LB; }
function fromKg(kg, unit) { return unit === "kg" ? kg : Math.round((kg / KG_PER_LB) * 10) / 10; }
function uid() { return Math.random().toString(36).slice(2, 10); }
function dateKey(d) {
  d = d || new Date();
  var x = new Date(d);
  x.setMinutes(x.getMinutes() - x.getTimezoneOffset());
  return x.toISOString().slice(0, 10);
}
function startOfWeek(d) {
  d = d || new Date();
  var x = new Date(d);
  x.setHours(0, 0, 0, 0);
  x.setDate(x.getDate() - x.getDay());
  return x;
}
function weekKey(d) { return dateKey(startOfWeek(d)); }
function monthKey(d) { return dateKey(d).slice(0, 7); }
function isLastDayOfMonth(d) {
  var next = new Date(d);
  next.setDate(next.getDate() + 1);
  return next.getDate() === 1;
}

var MEALS = ["Breakfast", "Lunch", "Dinner", "Snacks"];

// ---------- tiny icon helper (emoji, no icon library) ----------
function Icon(glyph, size, className) {
  return h("span", { style: { fontSize: size || 16, lineHeight: 1, display: "inline-flex" }, className: className || "" }, glyph);
}

// ---------- shared UI ----------
function Field(props) {
  var label = props.label;
  var inputProps = {};
  for (var k in props) { if (k !== "label") inputProps[k] = props[k]; }
  inputProps.className = "field-input";
  return h("div", { className: "mb-3" },
    h("label", { className: "field-label" }, label),
    h("input", inputProps)
  );
}

function Modal(props) {
  return h("div", { className: "modal-backdrop", onClick: function (e) { if (e.target === e.currentTarget) props.onClose(); } },
    h("div", { className: "modal-box" },
      h("div", { className: "modal-header" },
        h("h3", { className: "modal-title" }, props.title),
        h("button", { onClick: props.onClose, className: "icon-btn" }, Icon("✕", 16))
      ),
      h("div", { className: "modal-body" }, props.children)
    )
  );
}

function Segmented(props) {
  return h("div", { className: "segmented" },
    props.options.map(function (opt) {
      return h("button", {
        key: opt,
        onClick: function () { props.onChange(opt); },
        className: "segmented-btn" + (props.value === opt ? " segmented-btn-active" : "")
      }, opt);
    })
  );
}

function ProgressBar(props) {
  var pct = Math.max(0, Math.min(100, props.pct));
  return h("div", { className: "progress-track" },
    h("div", { className: "progress-fill", style: { width: pct + "%", backgroundColor: props.color || "#a3e635" } })
  );
}

function MacroBar(props) {
  var pct = props.goal > 0 ? Math.min(100, (props.current / props.goal) * 100) : 0;
  return h("div", { className: "mb-3" },
    h("div", { className: "row-between mb-1" },
      h("span", { className: "label-sm" }, props.label),
      h("span", { className: "value-mono" }, Math.round(props.current) + " / " + props.goal + "g")
    ),
    h(ProgressBar, { pct: pct, color: props.color })
  );
}

// ---------- simple hand-built SVG line chart ----------
function SimpleLineChart(props) {
  var data = props.data, dataKey = props.dataKey, labelKey = props.labelKey, height = props.height || 200;
  var width = 320, padY = 20, padX = 8;
  var values = data.map(function (d) { return d[dataKey]; });
  var min = Math.min.apply(null, values);
  var max = Math.max.apply(null, values);
  var span = max - min || 1;
  var stepX = (width - padX * 2) / Math.max(1, data.length - 1);
  var points = data.map(function (d, i) {
    return { x: padX + i * stepX, y: padY + (1 - (d[dataKey] - min) / span) * (height - padY * 2) };
  });
  var pathD = points.map(function (p, i) { return (i === 0 ? "M " : "L ") + p.x + " " + p.y; }).join(" ");
  return h("svg", { width: "100%", height: height, viewBox: "0 0 " + width + " " + height, preserveAspectRatio: "none" },
    [0, 0.5, 1].map(function (f) {
      var y = padY + f * (height - padY * 2);
      return h("line", { key: f, x1: padX, x2: width - padX, y1: y, y2: y, stroke: "#27272a", strokeWidth: "1" });
    }),
    h("path", { d: pathD, fill: "none", stroke: "#a3e635", strokeWidth: "2.5", strokeLinejoin: "round", strokeLinecap: "round" }),
    points.map(function (p, i) { return h("circle", { key: i, cx: p.x, cy: p.y, r: "3", fill: "#a3e635" }); })
  );
}

// ---------- Goal edit form ----------
function EditGoalsForm(props) {
  var goals = props.goals, unit = props.unit;
  var s1 = useState(String(fromKg(goals.targetWeightKg, unit))), targetWeight = s1[0], setTargetWeight = s1[1];
  var s2 = useState(String(goals.calorieGoal)), calorieGoal = s2[0], setCalorieGoal = s2[1];
  var s3 = useState(String(goals.workoutMinutes)), workoutMinutes = s3[0], setWorkoutMinutes = s3[1];
  var s4 = useState(String(goals.workoutDays)), workoutDays = s4[0], setWorkoutDays = s4[1];

  function submit() {
    props.onSave({
      targetWeightKg: toKg(parseFloat(targetWeight) || 0, unit),
      calorieGoal: parseInt(calorieGoal, 10) || 0,
      workoutMinutes: parseInt(workoutMinutes, 10) || 0,
      workoutDays: Math.min(7, Math.max(1, parseInt(workoutDays, 10) || 1))
    });
  }

  return h("div", null,
    h(Field, { label: "Target weight (" + unit + ")", value: targetWeight, onChange: function (e) { setTargetWeight(e.target.value); }, placeholder: "0", inputMode: "decimal" }),
    h(Field, { label: "Daily calorie goal", value: calorieGoal, onChange: function (e) { setCalorieGoal(e.target.value); }, placeholder: "0", inputMode: "numeric" }),
    h("div", { className: "grid-2" },
      h(Field, { label: "Workout length (min)", value: workoutMinutes, onChange: function (e) { setWorkoutMinutes(e.target.value); }, placeholder: "0", inputMode: "numeric" }),
      h(Field, { label: "Days per week", value: workoutDays, onChange: function (e) { setWorkoutDays(e.target.value); }, placeholder: "0", inputMode: "numeric" })
    ),
    h("button", { onClick: submit, className: "btn-primary mt-2" }, "Save goals")
  );
}

// ---------- Food entry: quick-add / manual / scan ----------
function AddFoodFlow(props) {
  var knownFoods = props.knownFoods;
  var sMeal = useState(null), meal = sMeal[0], setMeal = sMeal[1];
  var sMode = useState(knownFoods.length ? "Quick add" : "Manual"), mode = sMode[0], setMode = sMode[1];
  var sName = useState(""), name = sName[0], setName = sName[1];
  var sCal = useState(""), calories = sCal[0], setCalories = sCal[1];
  var sPro = useState(""), protein = sPro[0], setProtein = sPro[1];
  var sCarb = useState(""), carbs = sCarb[0], setCarbs = sCarb[1];
  var sSugar = useState(""), sugar = sSugar[0], setSugar = sSugar[1];
  var sFat = useState(""), fat = sFat[0], setFat = sFat[1];
  var sScan = useState("idle"), scanStep = sScan[0], setScanStep = sScan[1];

  function fillFrom(food) {
    setName(food.name); setCalories(String(food.calories)); setProtein(String(food.protein));
    setCarbs(String(food.carbs)); setSugar(String(food.sugar)); setFat(String(food.fat));
    setMode("Manual");
  }
  function submit() {
    if (!name.trim() || !calories) return;
    props.onAdd(meal, {
      name: name.trim(),
      calories: parseFloat(calories) || 0,
      protein: parseFloat(protein) || 0,
      carbs: parseFloat(carbs) || 0,
      sugar: parseFloat(sugar) || 0,
      fat: parseFloat(fat) || 0
    });
  }
  function mockScan(kind) {
    setScanStep("scanning");
    setTimeout(function () {
      setName(kind === "barcode" ? "Scanned product" : "Label scan result");
      setCalories("210"); setProtein("9"); setCarbs("27"); setSugar("11"); setFat("7");
      setScanStep("idle"); setMode("Manual");
    }, 900);
  }

  if (!meal) {
    return h("div", null,
      h("p", { className: "hint" }, "Which meal is this for?"),
      MEALS.map(function (m) {
        return h("button", { key: m, onClick: function () { setMeal(m); }, className: "list-btn" }, m);
      })
    );
  }

  var options = knownFoods.length ? ["Quick add", "Manual", "Scan"] : ["Manual", "Scan"];

  return h("div", null,
    h("button", { onClick: function () { setMeal(null); }, className: "back-link" }, "‹ " + meal),
    h(Segmented, { options: options, value: mode, onChange: setMode }),

    mode === "Quick add" ? h("div", { className: "scroll-list" },
      knownFoods.map(function (f) {
        return h("button", { key: f.name, onClick: function () { fillFrom(f); }, className: "quick-item" },
          h("div", { className: "quick-item-title" }, f.name),
          h("div", { className: "quick-item-sub" }, f.calories + " cal · P " + f.protein + "g · C " + f.carbs + "g · Sugar " + f.sugar + "g · F " + f.fat + "g")
        );
      })
    ) : null,

    mode === "Scan" ? h("div", { className: "scan-box" },
      scanStep === "scanning"
        ? h("div", { className: "scanning-text" }, "READING…")
        : h("div", null,

    workoutModal ? h(Modal, { title: "Log workout", onClose: function () { setWorkoutModal(false); } }, h(AddWorkoutForm, { onAdd: addWorkout, knownWorkouts: knownWorkouts })) : null,
    goalModalOpen ? h(Modal, { title: "Edit goals", onClose: function () { setGoalModalOpen(false); } }, h(EditGoalsForm, { goals: goals, unit: unit, onSave: function (g) { setGoals(g); setGoalModalOpen(false); } })) : null,
    summariesOpen ? h(SummariesModal, { weeklySummaries: weeklySummaries, monthlySummaries: monthlySummaries, onClose: function () { setSummariesOpen(false); } }) : null,
    settingsOpen ? h(Modal, { title: "Settings", onClose: function () { setSettingsOpen(false); } },
      h("div", { className: "label-sm mb-2" }, "Weight unit"),
      h(Segmented, { options: ["kg", "lbs"], value: unit, onChange: setUnit }),
      h("p", { className: "hint" }, "Existing entries convert automatically."),
      !useRealStorage ? h("p", { className: "hint mt-2", style: { color: "#fb923c" } }, "Note: this preview can't access persistent storage here, so entries won't be saved between reloads. Once hosted in a real browser, your data will save normally.") : null
    ) : null
  );

  return h("div", { className: "app-shell" }, header, h("div", { className: "app-body" }, dashboardBody, foodBody, workoutsBody, weightBody), tabBar, modals);
}

var rootEl = document.getElementById("root");
ReactDOM.createRoot(rootEl).render(h(Datum));

}

</script>
<script>
  tryLoadFrom(0);
</script>
</body>
