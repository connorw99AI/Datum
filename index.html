<style>
* { box-sizing: border-box; }
html, body { background: #000; margin: 0; height: 100%; }
body { font-family: 'Inter', -apple-system, sans-serif; }
button, input { font-family: inherit; }
button { cursor: pointer; border: none; background: none; }

.app-shell { width: 100%; max-width: 28rem; margin: 0 auto; height: 100vh; height: 100dvh; max-height: 800px; background: #000; display: flex; flex-direction: column; border-radius: 1.5rem; overflow: hidden; border: 1px solid #27272a; }
.app-body { flex: 1 1 0%; overflow-y: auto; padding: 1rem 1.25rem; -webkit-overflow-scrolling: touch; }

@media (max-width: 480px), (max-height: 700px) {
  html, body { overflow: hidden; }
  .app-shell { max-width: 100%; height: 100vh; height: 100dvh; max-height: none; border-radius: 0; border: none; }
  .header { padding-top: calc(1.5rem + env(safe-area-inset-top)); }
  .tabbar { padding-bottom: env(safe-area-inset-bottom); }
}

<body>
<div id="root">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#71717a;font-family:monospace;font-size:13px;">Loading…</div>
</div>
<script>
  window.onerror = function (msg, url, line, col, err) {
    document.getElementById("root").innerHTML =
      '<pre style="color:#f87171;background:#18181b;padding:20px;white-space:pre-wrap;font-family:monospace;font-size:12px;border-radius:12px;margin:16px;">' +
      "Error: " + String(msg) + "\nLine " + line + ", Col " + col + "\n\n" + (err && err.stack ? err.stack : "") +
      "</pre>";
  };
</script>
<script>
  var CDN_SOURCES = [
    { react: "https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js",
      reactDom: "https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js",
      name: "cdnjs" },
    { react: "https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js",
      reactDom: "https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js",
      name: "jsdelivr" },
    { react: "https://unpkg.com/react@18/umd/react.production.min.js",
      reactDom: "https://unpkg.com/react-dom@18/umd/react-dom.production.min.js",
      name: "unpkg" }
  ];

  function loadScript(src) {
    return new Promise(function (resolve, reject) {
      var s = document.createElement("script");
      s.src = src;
      s.crossOrigin = "anonymous";
      s.onload = resolve;
      s.onerror = function () { reject(new Error("failed to load " + src)); };
      document.head.appendChild(s);
    });
  }

  function tryLoadFrom(sourceIndex) {
    if (sourceIndex >= CDN_SOURCES.length) {
      document.getElementById("root").innerHTML =
        '<pre style="color:#f87171;background:#18181b;padding:20px;white-space:pre-wrap;font-family:monospace;font-size:12px;border-radius:12px;margin:16px;">' +
        "Couldn't load React from any CDN (tried cdnjs, jsdelivr, unpkg).\n\n" +
        "This points to a network-level block on your connection rather than one specific site. Try switching networks (e.g. mobile data instead of wifi), disabling any content/ad/privacy blocker for this page, or opening this file once it's actually hosted online." +
        "</pre>";
      return;
    }
    var src = CDN_SOURCES[sourceIndex];
    loadScript(src.react)
      .then(function () { return loadScript(src.reactDom); })
      .then(function () {
        if (typeof React === "undefined" || typeof ReactDOM === "undefined") {
          throw new Error("loaded but globals missing from " + src.name);
        }
        initDatumApp();
      })
      .catch(function () { tryLoadFrom(sourceIndex + 1); });
  }
</script>
<script>
function initDatumApp() {
// ============================================================
// Datum — plain JS (no JSX/Babel) React app.
// Storage: uses real localStorage when available (e.g. hosted on
// GitHub Pages); silently falls back to an in-memory store when
// localStorage is blocked (e.g. inside a sandboxed preview), so
// the app still works there for testing, it just won't persist
// between reloads in that specific context.
// ============================================================
"use strict";

var h = React.createElement;
var useState = React.useState;
var useMemo = React.useMemo;
var useEffect = React.useEffect;
var useRef = React.useRef;

// ---------- storage ----------
var STORAGE_PREFIX = "datum:";
var memoryStore = {};
var useRealStorage = true;
try {
  var testKey = "__datum_test__";
  window.localStorage.setItem(testKey, "1");
  window.localStorage.removeItem(testKey);
} catch (e) {
  useRealStorage = false;
}
function loadKey(key, fallback) {
  try {
    if (useRealStorage) {
      var raw = window.localStorage.getItem(STORAGE_PREFIX + key);
      return raw ? JSON.parse(raw) : fallback;
    }
    return Object.prototype.hasOwnProperty.call(memoryStore, key)
      ? JSON.parse(JSON.stringify(memoryStore[key]))
      : fallback;
  } catch (e) {
    return fallback;
  }
}
function saveKey(key, value) {
  try {
    if (useRealStorage) {
      window.localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(value));
    } else {
      memoryStore[key] = value;
    }
  } catch (e) {}
}

// ---------- date / unit helpers ----------
var KG_PER_LB = 0.453592;
function toKg(val, unit) { return unit === "kg" ? val : val * KG_PER_LB; }
function fromKg(kg, unit) { return unit === "kg" ? kg : Math.round((kg / KG_PER_LB) * 10) / 10; }
function uid() { return Math.random().toString(36).slice(2, 10); }
function dateKey(d) {
  d = d || new Date();
  var x = new Date(d);
  x.setMinutes(x.getMinutes() - x.getTimezoneOffset());
  return x.toISOString().slice(0, 10);
}
function startOfWeek(d) {
  d = d || new Date();
  var x = new Date(d);
  x.setHours(0, 0, 0, 0);
  x.setDate(x.getDate() - x.getDay());
  return x;
}
function weekKey(d) { return dateKey(startOfWeek(d)); }
function monthKey(d) { return dateKey(d).slice(0, 7); }
function isLastDayOfMonth(d) {
  var next = new Date(d);
  next.setDate(next.getDate() + 1);
  return next.getDate() === 1;
}
function formatShortDate(key) {
  var d = new Date(key + "T00:00:00");
  return d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
}
function formatTime(d) {
  d = d || new Date();
  return d.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" });
}
function addDays(key, delta) {
  var d = new Date(key + "T00:00:00");
  d.setDate(d.getDate() + delta);
  return dateKey(d);
}

var MEALS = ["Breakfast", "Lunch", "Dinner", "Snacks"];

// ---------- tiny icon helper (emoji, no icon library) ----------
function Icon(glyph, size, className) {
  return h("span", { style: { fontSize: size || 16, lineHeight: 1, display: "inline-flex" }, className: className || "" }, glyph);
}

// ---------- shared UI ----------
function Field(props) {
  var label = props.label;
  var inputProps = {};
  for (var k in props) { if (k !== "label") inputProps[k] = props[k]; }
  inputProps.className = "field-input";
  return h("div", { className: "mb-3" },
    h("label", { className: "field-label" }, label),
    h("input", inputProps)
  );
}

function Modal(props) {
  return h("div", { className: "modal-backdrop", onClick: function (e) { if (e.target === e.currentTarget) props.onClose(); } },
    h("div", { className: "modal-box" },
      h("div", { className: "modal-header" },
        h("h3", { className: "modal-title" }, props.title),
        h("button", { onClick: props.onClose, className: "icon-btn" }, Icon("✕", 16))
      ),
      h("div", { className: "modal-body" }, props.children)
    )
  );
}

function Segmented(props) {
  return h("div", { className: "segmented" },
    props.options.map(function (opt) {
      return h("button", {
        key: opt,
        onClick: function () { props.onChange(opt); },
        className: "segmented-btn" + (props.value === opt ? " segmented-btn-active" : "")
      }, opt);
    })
  );
}

function ProgressBar(props) {
  var pct = Math.max(0, Math.min(100, props.pct));
  return h("div", { className: "progress-track" },
    h("div", { className: "progress-fill", style: { width: pct + "%", backgroundColor: props.color || "#a3e635" } })
  );
}

function MacroBar(props) {
  var pct = props.goal > 0 ? Math.min(100, (props.current / props.goal) * 100) : 0;
  return h("div", { className: "mb-3" },
    h("div", { className: "row-between mb-1" },
      h("span", { className: "label-sm" }, props.label),
      h("span", { className: "value-mono" }, Math.round(props.current) + " / " + props.goal + "g")
    ),
    h(ProgressBar, { pct: pct, color: props.color })
  );
}

// ---------- simple hand-built SVG line chart ----------
function SimpleLineChart(props) {
  var data = props.data, dataKey = props.dataKey, labelKey = props.labelKey, height = props.height || 200;
  var width = 320, padY = 20, padX = 8;
  var values = data.map(function (d) { return d[dataKey]; });
  var min = Math.min.apply(null, values);
  var max = Math.max.apply(null, values);
  var span = max - min || 1;
  var stepX = (width - padX * 2) / Math.max(1, data.length - 1);
  var points = data.map(function (d, i) {
    return { x: padX + i * stepX, y: padY + (1 - (d[dataKey] - min) / span) * (height - padY * 2) };
  });
  var pathD = points.map(function (p, i) { return (i === 0 ? "M " : "L ") + p.x + " " + p.y; }).join(" ");
  return h("svg", { width: "100%", height: height, viewBox: "0 0 " + width + " " + height, preserveAspectRatio: "none" },
    [0, 0.5, 1].map(function (f) {
      var y = padY + f * (height - padY * 2);
      return h("line", { key: f, x1: padX, x2: width - padX, y1: y, y2: y, stroke: "#27272a", strokeWidth: "1" });
    }),
    h("path", { d: pathD, fill: "none", stroke: "#a3e635", strokeWidth: "2.5", strokeLinejoin: "round", strokeLinecap: "round" }),
    points.map(function (p, i) { return h("circle", { key: i, cx: p.x, cy: p.y, r: "3", fill: "#a3e635" }); })
  );
}

// ---------- Goal edit form ----------
function EditGoalsForm(props) {
  var goals = props.goals, unit = props.unit;
  var s1 = useState(String(fromKg(goals.targetWeightKg, unit))), targetWeight = s1[0], setTargetWeight = s1[1];
  var s2 = useState(String(goals.calorieGoal)), calorieGoal = s2[0], setCalorieGoal = s2[1];
  var s3 = useState(String(goals.workoutMinutes)), workoutMinutes = s3[0], setWorkoutMinutes = s3[1];
  var s4 = useState(String(goals.workoutDays)), workoutDays = s4[0], setWorkoutDays = s4[1];

  function submit() {
    props.onSave({
      targetWeightKg: toKg(parseFloat(targetWeight) || 0, unit),
      calorieGoal: parseInt(calorieGoal, 10) || 0,
      workoutMinutes: parseInt(workoutMinutes, 10) || 0,
      workoutDays: Math.min(7, Math.max(1, parseInt(workoutDays, 10) || 1))
    });
  }

  return h("div", null,
    h(Field, { label: "Target weight (" + unit + ")", value: targetWeight, onChange: function (e) { setTargetWeight(e.target.value); }, placeholder: "0", inputMode: "decimal" }),
    h(Field, { label: "Daily calorie goal", value: calorieGoal, onChange: function (e) { setCalorieGoal(e.target.value); }, placeholder: "0", inputMode: "numeric" }),
    h("div", { className: "grid-2" },
      h(Field, { label: "Workout length (min)", value: workoutMinutes, onChange: function (e) { setWorkoutMinutes(e.target.value); }, placeholder: "0", inputMode: "numeric" }),
      h(Field, { label: "Days per week", value: workoutDays, onChange: function (e) { setWorkoutDays(e.target.value); }, placeholder: "0", inputMode: "numeric" })
    ),
    h("button", { onClick: submit, className: "btn-primary mt-2" }, "Save goals")
  );
}

// ---------- Food entry: quick-add / manual (total or per-100g) / scan ----------
function AddFoodFlow(props) {
  var knownFoods = props.knownFoods;
  var sMeal = useState(null), meal = sMeal[0], setMeal = sMeal[1];
  var sMode = useState(knownFoods.length ? "Quick add" : "Manual"), mode = sMode[0], setMode = sMode[1];
  var sEntryMode = useState("Total"), entryMode = sEntryMode[0], setEntryMode = sEntryMode[1]; // "Total" | "Per 100g"
  var sName = useState(""), name = sName[0], setName = sName[1];
  var sCal = useState(""), calories = sCal[0], setCalories = sCal[1];
  var sPro = useState(""), protein = sPro[0], setProtein = sPro[1];
  var sCarb = useState(""), carbs = sCarb[0], setCarbs = sCarb[1];
  var sSugar = useState(""), sugar = sSugar[0], setSugar = sSugar[1];
  var sFat = useState(""), fat = sFat[0], setFat = sFat[1];
  var sWeight = useState(""), foodWeight = sWeight[0], setFoodWeight = sWeight[1];
  var sWeightUnit = useState("g"), weightUnit = sWeightUnit[0], setWeightUnit = sWeightUnit[1];
  var sScanStatus = useState("idle"), scanStatus = sScanStatus[0], setScanStatus = sScanStatus[1]; // idle | starting | scanning | looking-up | error
  var sScanError = useState(""), scanError = sScanError[0], setScanError = sScanError[1];
  var scanContainerId = useState(function () { return "scan-" + uid(); })[0];
  var scannerRef = useRef(null);

  function fillFrom(food) {
    setName(food.name); setCalories(String(food.calories)); setProtein(String(food.protein));
    setCarbs(String(food.carbs)); setSugar(String(food.sugar)); setFat(String(food.fat));
    setMode("Manual"); setEntryMode("Total");
  }

  function perGram(v) { return (parseFloat(v) || 0) / 100; }
  var weightNum = parseFloat(foodWeight) || 0;
  var computed = entryMode === "Per 100g" ? {
    calories: Math.round(perGram(calories) * weightNum),
    protein: Math.round(perGram(protein) * weightNum * 10) / 10,
    carbs: Math.round(perGram(carbs) * weightNum * 10) / 10,
    sugar: Math.round(perGram(sugar) * weightNum * 10) / 10,
    fat: Math.round(perGram(fat) * weightNum * 10) / 10
  } : null;

  function submit() {
    if (!name.trim()) return;

    var totals = entries.reduce(function (a, e) {
      return { calories: a.calories + e.calories, protein: a.protein + e.protein, carbs: a.carbs + e.carbs, sugar: a.sugar + e.sugar, fat: a.fat + e.fat };
    }, { calories: 0, protein: 0, carbs: 0, sugar: 0, fat: 0 });
    var days = new Set(entries.map(function (e) { return e.date; })).size || 1;
    return {
      avgCalories: Math.round(totals.calories / days),
      totalProtein: Math.round(totals.protein), totalCarbs: Math.round(totals.carbs),
      totalSugar: Math.round(totals.sugar), totalFat: Math.round(totals.fat),
      workoutCount: wos.length,
      caloriesBurned: wos.reduce(function (s, w) { return s + w.caloriesBurned; }, 0)
    };
  }

  useEffect(function () {
    function check() {
      var now = new Date();
      var wk = weekKey(now);
      if (now.getDay() === 0 && now.getHours() === 23 && now.getMinutes() >= 50 && lastWeekChecked.current !== wk) {
        var weekStart = startOfWeek(now);
        var entries = foodEntries.filter(function (e) { return new Date(e.date) >= weekStart; });
        var wos = workouts.filter(function (w) { return new Date(w.date) >= weekStart; });
        if (entries.length || wos.length) {
          setWeeklySummaries(function (prev) { return prev.concat([Object.assign({ weekKey: wk }, aggregate(entries, wos))]); });
        }
        lastWeekChecked.current = wk; saveKey("lastWeekSummarized", wk);
      }
      var mk = monthKey(now);
      if (isLastDayOfMonth(now) && now.getHours() === 23 && now.getMinutes() >= 50 && lastMonthChecked.current !== mk) {
        var mEntries = foodEntries.filter(function (e) { return e.date.slice(0, 7) === mk; });
        var mWos = workouts.filter(function (w) { return w.date.slice(0, 7) === mk; });
        if (mEntries.length || mWos.length) {
          setMonthlySummaries(function (prev) { return prev.concat([Object.assign({ monthKey: mk }, aggregate(mEntries, mWos))]); });
        }
        lastMonthChecked.current = mk; saveKey("lastMonthSummarized", mk);
      }
    }
    check();
    var id = setInterval(check, 30000);
    return function () { clearInterval(id); };
  }, [foodEntries, workouts]);

  var today = dateKey();
  var viewedFood = useMemo(function () { return foodEntries.filter(function (e) { return e.date === selectedDate; }); }, [foodEntries, selectedDate]);
  var viewedWorkouts = useMemo(function () { return workouts.filter(function (w) { return w.date === selectedDate; }); }, [workouts, selectedDate]);

  var totals = useMemo(function () {
    return viewedFood.reduce(function (a, e) {
      return { calories: a.calories + e.calories, protein: a.protein + e.protein, carbs: a.carbs + e.carbs, sugar: a.sugar + e.sugar, fat: a.fat + e.fat };
    }, { calories: 0, protein: 0, carbs: 0, sugar: 0, fat: 0 });
  }, [viewedFood]);

  var foodHistoryDays = useMemo(function () {
    var byDate = new Map();
    foodEntries.forEach(function (e) {
      var entry = byDate.get(e.date) || { date: e.date, calories: 0, count: 0 };
      entry.calories += e.calories; entry.count += 1;
      byDate.set(e.date, entry);
    });
    return Array.from(byDate.values()).sort(function (a, b) { return a.date < b.date ? 1 : -1; }).map(function (d) {
      return { date: d.date, calories: Math.round(d.calories), count: d.count };
    });
  }, [foodEntries]);

  var knownFoods = useMemo(function () {
    var byName = new Map();
    foodEntries.forEach(function (e) { byName.set(e.name, e); });
    return Array.from(byName.values()).reverse().slice(0, 20);
  }, [foodEntries]);

  var knownWorkouts = useMemo(function () {
    var byName = new Map();
    workouts.forEach(function (w) { byName.set(w.name, w); });
    return Array.from(byName.values()).reverse().slice(0, 20);
  }, [workouts]);

  var displayWeights = weights.map(function (w) { return Object.assign({}, w, { display: fromKg(w.kg, unit) }); });
  var currentWeightKg = weights.length ? weights[weights.length - 1].kg : null;
  var startWeightKg = weights.length ? weights[0].kg : null;
  var currentDisplay = currentWeightKg != null ? fromKg(currentWeightKg, unit) : null;

  var sessionsThisWeek = useMemo(function () {
    var wk = startOfWeek();
    return workouts.filter(function (w) { return new Date(w.date) >= wk; }).length;
  }, [workouts]);

  var weekWorkoutsByDay = useMemo(function () {
    var wk = startOfWeek();
    var inWeek = workouts.filter(function (w) { return new Date(w.date) >= wk; });
    var byDate = new Map();
    inWeek.forEach(function (w) {
      var list = byDate.get(w.date) || [];
      list.push(w);
      byDate.set(w.date, list);
    });
    return Array.from(byDate.entries())
      .sort(function (a, b) { return a[0] < b[0] ? 1 : -1; })
      .map(function (pair) { return { date: pair[0], items: pair[1] }; });
  }, [workouts]);

  var workoutHistoryDays = useMemo(function () {
    var wk = startOfWeek();
    var inWeek = workouts.filter(function (w) { return new Date(w.date) >= wk; });
    var byDate = new Map();
    inWeek.forEach(function (w) {
      var entry = byDate.get(w.date) || { date: w.date, caloriesBurned: 0, count: 0 };
      entry.caloriesBurned += w.caloriesBurned; entry.count += 1;
      byDate.set(w.date, entry);
    });
    return Array.from(byDate.values()).sort(function (a, b) { return a.date < b.date ? 1 : -1; });
  }, [workouts]);

  function addFood(meal, entry) {
    var now = new Date();
    setFoodEntries(function (prev) { return prev.concat([Object.assign({ id: uid(), meal: meal, date: selectedDate, timestamp: now.getTime() }, entry)]); });
    setFoodModalOpen(false);
  }
  function removeFood(id) { setFoodEntries(function (prev) { return prev.filter(function (e) { return e.id !== id; }); }); }

  function addWorkout(entry) {
    var now = new Date();
    setWorkouts(function (prev) { return prev.concat([Object.assign({ id: uid(), date: selectedDate, timestamp: now.getTime() }, entry)]); });
    setWorkoutModal(false);
  }
  function removeWorkout(id) { setWorkouts(function (prev) { return prev.filter(function (w) { return w.id !== id; }); }); }

  function logWeight() {
    var val = parseFloat(weightInput);
    if (!val || val <= 0) return;
    var kg = toKg(val, unit);
    var now = new Date();
    setWeights(function (prev) { return prev.concat([{ id: uid(), date: dateKey(now), day: dateKey(now).slice(5), kg: kg }]); });
    setWeightInput("");
  }

  function exportData() {
    var payload = {
      exportedAt: new Date().toISOString(),
      app: "Datum",
      version: 1,
      foodEntries: foodEntries, workouts: workouts, weights: weights,
      weeklySummaries: weeklySummaries, monthlySummaries: monthlySummaries,
      goals: goals, unit: unit
    };
    var blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "datum-export-" + dateKey() + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importData(file) {
    var reader = new FileReader();
    reader.onload = function () {
      try {
        var data = JSON.parse(reader.result);
        if (!data || typeof data !== "object") throw new Error("not an object");
        if (Array.isArray(data.foodEntries)) setFoodEntries(data.foodEntries);
        if (Array.isArray(data.workouts)) setWorkouts(data.workouts);
        if (Array.isArray(data.weights)) setWeights(data.weights);
        if (Array.isArray(data.weeklySummaries)) setWeeklySummaries(data.weeklySummaries);
        if (Array.isArray(data.monthlySummaries)) setMonthlySummaries(data.monthlySummaries);
        if (data.goals && typeof data.goals === "object") setGoals(data.goals);
        if (typeof data.unit === "string") setUnit(data.unit);
        setImportMessage("Import successful.");
      } catch (e) {
        setImportMessage("Import failed: the file isn't a valid Datum export.");
      }
    };
    reader.onerror = function () { setImportMessage("Import failed: couldn't read the file."); };
    reader.readAsText(file);
  }

  var headerLogo = h("svg", { width: 14, height: 14, viewBox: "0 0 64 64" },
    h("circle", { cx: 32, cy: 32, r: 26, fill: "none", stroke: "#27272a", strokeWidth: 10 }),
    h("circle", { cx: 32, cy: 32, r: 26, fill: "none", stroke: "#a3e635", strokeWidth: 10, strokeDasharray: 2 * Math.PI * 26, strokeDashoffset: 2 * Math.PI * 26 * 0.3, strokeLinecap: "round", transform: "rotate(-90 32 32)" })
  );

  var header = h("div", { className: "header" },
    h("div", null,
      h("div", { className: "row gap-1-5 mb-0-5" }, headerLogo, h("span", { className: "brand" }, "Datum")),
      h("div", { className: "page-title-row" },
        h("span", { className: "page-title" },
          tab === "dashboard" ? "Today" : tab === "food" ? "Food Log" : tab === "workouts" ? "Training" : "Weight"
        ),
        h("span", { className: "header-clock" }, formatShortDate(dateKey(nowClock)) + " · " + formatTime(nowClock))
      )
    ),
    h("div", { className: "row gap-2" },
      h("button", { onClick: function () { setSummariesOpen(true); }, className: "icon-btn" }, Icon("🕐", 16)),
      h("button", { onClick: function () { setSettingsOpen(true); }, className: "icon-btn" }, Icon("⚙️", 16))
    )
  );

  var dashboardBody = tab !== "dashboard" ? null : h("div", null,
    h(DateNav, { selectedDate: selectedDate, onChange: setSelectedDate }),
    h("div", { className: "counter-card" },
      h("div", { className: "counter-number" }, Math.round(totals.calories), h("span", { className: "counter-goal" }, "/" + goals.calorieGoal)),
      h("div", { className: "counter-label" }, selectedDate === today ? "calories consumed today" : "calories consumed on " + formatShortDate(selectedDate))
    ),
    h(GoalCard, { goals: goals, unit: unit, currentWeightKg: currentWeightKg, startWeightKg: startWeightKg, sessionsThisWeek: sessionsThisWeek, onEdit: function () { setGoalModalOpen(true); } }),
    h("div", { className: "card mb-4" },
      h("div", { className: "row-between mb-3" },
        h("span", { className: "card-title" }, "Nutrition")
      ),
      h(MacroBar, { label: "Protein", current: totals.protein, goal: macroGoals.protein, color: "#a3e635" }),
      h(MacroBar, { label: "Carbs", current: totals.carbs, goal: macroGoals.carbs, color: "#fb923c" }),
      h(MacroBar, { label: "Sugar", current: totals.sugar, goal: macroGoals.sugar, color: "#f472b6" }),
      h(MacroBar, { label: "Fat", current: totals.fat, goal: macroGoals.fat, color: "#60a5fa" }),
      h("button", { onClick: function () { setFoodModalOpen(true); }, className: "btn-primary mt-1" }, Icon("➕", 16), " Log food")
    ),
    h("div", { className: "card mb-4" },
      h("div", { className: "row-between mb-3" },
        h("span", { className: "card-title" }, selectedDate === today ? "Today's workout" : "Workout")
      ),
      viewedWorkouts.length === 0
        ? h("p", { className: "hint mb-3" }, selectedDate === today ? "No workout logged today." : "No workout logged this day.")
        : h("div", { className: "mb-3" }, viewedWorkouts.map(function (w) {
            return h("div", { key: w.id, className: "workout-row" },
              h("div", null, h("div", { className: "item-title" }, w.name), h("div", { className: "hint" }, w.durationMinutes + " min")),
              h("div", { className: "value-mono text-orange" }, w.caloriesBurned + " cal")
            );
          })),
      h("button", { onClick: function () { setWorkoutModal(true); }, className: "btn-primary" }, Icon("➕", 16), " Log workout")
    )
  );

  var foodBody = tab !== "food" ? null : h("div", null,
    h(DateNav, { selectedDate: selectedDate, onChange: setSelectedDate }),
    MEALS.map(function (meal) {
      var entries = viewedFood.filter(function (e) { return e.meal === meal; });
      var cals = entries.reduce(function (s, e) { return s + e.calories; }, 0);
      return h("div", { key: meal, className: "card mb-3" },
        h("div", { className: "row-between mb-2" }, h("span", { className: "card-title" }, meal), h("span", { className: "value-mono" }, cals + " cal")),
        entries.map(function (e) {
          return h("div", { key: e.id, className: "food-row", onDoubleClick: function () { removeFood(e.id); } },
            h("div", null,
              h("div", { className: "item-title" }, e.name),
              h("div", { className: "hint" }, "P " + e.protein + "g · C " + e.carbs + "g (sugar " + e.sugar + "g) · F " + e.fat + "g")
            ),
            h("div", { className: "value-mono text-lime" }, e.calories)
          );
        })
      );
    }),
    h("button", { onClick: function () { setFoodModalOpen(true); }, className: "btn-primary mb-2" }, Icon("➕", 16), " Log food"),
    h("button", { onClick: function () { setFoodHistoryOpen(true); }, className: "list-btn" }, Icon("🕐", 15), "  View history")
  );

  var workoutsBody = tab !== "workouts" ? null : h("div", null,
    h(DateNav, { selectedDate: selectedDate, onChange: setSelectedDate }),
    h("div", { className: "card center mb-4" },
      h("div", { className: "big-number" }, viewedWorkouts.reduce(function (s, w) { return s + w.caloriesBurned; }, 0)),
      h("div", { className: "counter-label" }, selectedDate === today ? "calories burned today" : "calories burned this day")
    ),
    h("div", { className: "card mb-4" },
      h("div", { className: "row-between mb-1" },
        h("span", { className: "label-sm" }, "This week"),
        h("span", { className: "value-mono" }, sessionsThisWeek + " / " + goals.workoutDays + " sessions")
      ),
      h(ProgressBar, { pct: goals.workoutDays > 0 ? (sessionsThisWeek / goals.workoutDays) * 100 : 0, color: "#fb923c" })
    ),
    viewedWorkouts.map(function (w) {
      return h("div", { key: w.id, className: "card row-between mb-2", onDoubleClick: function () { removeWorkout(w.id); } },
        h("div", null, h("div", { className: "item-title-bold" }, w.name), h("div", { className: "hint" }, w.durationMinutes + " min · double-tap to remove")),
        h("div", { className: "value-mono text-lime" }, w.caloriesBurned)
      );
    }),
    viewedWorkouts.length === 0 ? h("div", { className: "empty-state" }, "No workouts logged this day.") : null,
    h("button", { onClick: function () { setWorkoutModal(true); }, className: "btn-primary mt-2 mb-2" }, Icon("➕", 16), " Log workout"),
    h("button", { onClick: function () { setWorkoutHistoryOpen(true); }, className: "list-btn mb-4" }, Icon("🕐", 15), "  View history"),

    h("div", { className: "label-sm mb-2" }, "This week"),
    weekWorkoutsByDay.length === 0 ? h("p", { className: "hint" }, "Nothing logged yet this week.") : null,
    weekWorkoutsByDay.map(function (group) {
      var dayTotal = group.items.reduce(function (s, w) { return s + w.caloriesBurned; }, 0);
      return h("div", { key: group.date, className: "card mb-3" },
        h("div", { className: "row-between mb-2" },
          h("span", { className: "card-title" }, group.date === today ? "Today" : formatShortDate(group.date)),
          h("span", { className: "value-mono" }, dayTotal + " cal")
        ),
        group.items.map(function (w) {
          return h("div", { key: w.id, className: "workout-row" },
            h("div", null, h("div", { className: "item-title" }, w.name), h("div", { className: "hint" }, w.durationMinutes + " min")),
            h("div", { className: "value-mono text-orange" }, w.caloriesBurned + " cal")
          );
        })
      );
    })
  );

  var weightBody = tab !== "weight" ? null : h("div", null,
    h("div", { className: "row gap-2 mb-4" },
      h("input", {
        value: weightInput, onChange: function (e) { setWeightInput(e.target.value); },
        placeholder: "Today's weight (" + unit + ")", inputMode: "decimal", className: "weight-input"
      }),
      h("button", { onClick: logWeight, className: "log-btn" }, "Log")
    ),
    currentDisplay !== null ? h("div", { className: "row gap-2 mb-4" },
      h("div", { className: "stat-box" }, h("div", { className: "stat-num" }, currentDisplay), h("div", { className: "hint" }, "Current (" + unit + ")")),
      h("div", { className: "stat-box" }, h("div", { className: "stat-num" }, (currentDisplay - displayWeights[0].display).toFixed(1)), h("div", { className: "hint" }, "Since start"))
    ) : null,
    displayWeights.length >= 2 ? h("div", { className: "card mb-4" }, h(SimpleLineChart, { data: displayWeights, dataKey: "display", labelKey: "day", height: 200 })) : null,
    displayWeights.length === 0 ? h("div", { className: "empty-state" }, "No weight logged yet.") : null,
    displayWeights.slice().reverse().map(function (w) {
      return h("div", { key: w.id, className: "weight-row" },
        h("span", { className: "hint" }, w.date),
        h("span", { className: "value-mono-bold" }, w.display + " " + unit)
      );
    })
  );

  var tabBar = h("div", { className: "tabbar" },
    TABS.map(function (t) {
      return h("button", {
        key: t.key, onClick: function () { setTab(t.key); },
        className: "tab-btn" + (tab === t.key ? " tab-btn-active" : "")
      }, Icon(t.glyph, 19), h("span", { className: "tab-label" }, t.label));
    })
  );

  var modals = h(React.Fragment, null,
    foodModalOpen ? h(Modal, { title: "Log food", onClose: function () { setFoodModalOpen(false); } }, h(AddFoodFlow, { onAdd: addFood, knownFoods: knownFoods })) : null,
    workoutModal ? h(Modal, { title: "Log workout", onClose: function () { setWorkoutModal(false); } }, h(AddWorkoutForm, { onAdd: addWorkout, knownWorkouts: knownWorkouts })) : null,
    goalModalOpen ? h(Modal, { title: "Edit goals", onClose: function () { setGoalModalOpen(false); } }, h(EditGoalsForm, { goals: goals, unit: unit, onSave: function (g) { setGoals(g); setGoalModalOpen(false); } })) : null,
    summariesOpen ? h(SummariesModal, { weeklySummaries: weeklySummaries, monthlySummaries: monthlySummaries, onClose: function () { setSummariesOpen(false); } }) : null,
    foodHistoryOpen ? h(FoodHistoryModal, {
      days: foodHistoryDays, onClose: function () { setFoodHistoryOpen(false); },
      onSelect: function (date) { setSelectedDate(date); setFoodHistoryOpen(false); }
    }) : null,
    workoutHistoryOpen ? h(WorkoutHistoryModal, {
      days: workoutHistoryDays, weeklySummaries: weeklySummaries, onClose: function () { setWorkoutHistoryOpen(false); },
      onSelect: function (date) { setSelectedDate(date); setWorkoutHistoryOpen(false); }
    }) : null,
    settingsOpen ? h(Modal, { title: "Settings", onClose: function () { setSettingsOpen(false); } },
      h("div", { className: "label-sm mb-2" }, "Weight unit"),
      h(Segmented, { options: ["kg", "lbs"], value: unit, onChange: setUnit }),
      h("p", { className: "hint mb-4" }, "Existing entries convert automatically."),

      h("div", { className: "label-sm mb-2" }, "Your data"),
      h("button", { onClick: exportData, className: "list-btn" }, Icon("⬇️", 15), "  Export all data (.json)"),
      h("button", {
        onClick: function () { fileInputRef.current && fileInputRef.current.click(); },
        className: "list-btn"
      }, Icon("⬆️", 15), "  Import data from file"),
      h("input", {
        type: "file", accept: "application/json,.json", ref: fileInputRef, style: { display: "none" },
        onChange: function (e) {
          var file = e.target.files && e.target.files[0];
          if (file) importData(file);
          e.target.value = "";
        }
      }),
      importMessage ? h("p", { className: "hint", style: { color: importMessage.indexOf("failed") >= 0 ? "#f87171" : "#a3e635" } }, importMessage) : null,

      !useRealStorage ? h("p", { className: "hint mt-2", style: { color: "#fb923c" } }, "Note: this preview can't access persistent storage here, so entries won't be saved between reloads. Once hosted in a real browser, your data will save normally.") : null
    ) : null
  );

  return h("div", { className: "app-shell" }, header, h("div", { className: "app-body" }, dashboardBody, foodBody, workoutsBody, weightBody), tabBar, modals);
}

var rootEl = document.getElementById("root");
ReactDOM.createRoot(rootEl).render(h(Datum));

}
</script>
<script>
  tryLoadFrom(0);
</script>
</body>
</html>
