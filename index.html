<style>
* { box-sizing: border-box; }
:root {
  --bg: #0d0d10; --surface: #17171b; --border: #26262b; --text: #f2f2f4; --subtext: #82828a;
  --lime: #a3e635; --cyan: #1fd8c9; --orange: #ff7a29; --pink: #ff4f95; --blue: #5da2ff; --danger: #f87171;
}
html, body { background: #0d0d10; margin: 0; height: 100%; }
body { font-family: 'Inter', -apple-system, sans-serif; }
button, input { font-family: inherit; }
button { cursor: pointer; border: none; background: none; }

.app-shell {
  width: 100%; max-width: 380px; margin: 0 auto; height: 100vh; height: 100dvh; max-height: 800px;
  background: var(--bg); color: var(--text); display: flex; flex-direction: column;
  border-radius: 24px; overflow: hidden; border: 1px solid var(--border);
  box-shadow: 0 12px 40px rgba(0,0,0,0.2); position: relative;
}
@media (max-width: 480px), (max-height: 700px) {
  html, body { overflow: hidden; }

  function addWorkout(entry) {
    var now = new Date();
    setWorkouts(function (prev) { return prev.concat([Object.assign({ id: uid(), date: selectedDate, timestamp: now.getTime() }, entry)]); });
    setWorkoutModal(false);
  }
  function removeWorkout(id) { setWorkouts(function (prev) { return prev.filter(function (w) { return w.id !== id; }); }); }

  function logWeight() {
    var val = parseFloat(weightInput);
    if (!val || val <= 0) return;
    var kg = toKg(val, unit);
    setWeights(function (prev) { return prev.concat([{ id: uid(), date: dateKey(), kg: kg }]); });
    setWeightInput("");
  }

  function exportData() {
    var payload = {
      exportedAt: new Date().toISOString(), app: "Datum", version: 1,
      foodEntries: foodEntries, workouts: workouts, weights: weights,
      weeklySummaries: weeklySummaries, monthlySummaries: monthlySummaries,
      goals: goals, unit: unit, theme: theme
    };
    var blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = "datum-export-" + dateKey() + ".json";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importData(file) {
    var reader = new FileReader();
    reader.onload = function () {
      try {
        var data = JSON.parse(reader.result);
        if (!data || typeof data !== "object") throw new Error("not an object");
        if (Array.isArray(data.foodEntries)) setFoodEntries(data.foodEntries);
        if (Array.isArray(data.workouts)) setWorkouts(data.workouts);
        if (Array.isArray(data.weights)) setWeights(data.weights);
        if (Array.isArray(data.weeklySummaries)) setWeeklySummaries(data.weeklySummaries);
        if (Array.isArray(data.monthlySummaries)) setMonthlySummaries(data.monthlySummaries);
        if (data.goals && typeof data.goals === "object") setGoals(data.goals);
        if (typeof data.unit === "string") setUnit(data.unit);
        if (data.theme === "dark" || data.theme === "light") setTheme(data.theme);
        setImportMessage("Import successful.");
      } catch (e) {
        setImportMessage("Import failed: the file isn't a valid Datum export.");
      }
    };
    reader.onerror = function () { setImportMessage("Import failed: couldn't read the file."); };
    reader.readAsText(file);
  }

  var p = PALETTES[theme];
  var weightSinceStart = (currentWeightKg != null && startWeightKg != null) ? fmtDelta(currentWeightKg - startWeightKg, unit) : "—";

  var headerLogo = h("svg", { width: 22, height: 22, viewBox: "0 0 64 64" },
    h("circle", { cx: 32, cy: 32, r: 26, fill: "none", stroke: "var(--border)", strokeWidth: 10 }),
    h("circle", { cx: 32, cy: 32, r: 26, fill: "none", stroke: "var(--lime)", strokeWidth: 10, strokeDasharray: 163, strokeDashoffset: 49, strokeLinecap: "round", transform: "rotate(-90 32 32)" })
  );

  var header = h("div", { className: "header" },
    h("div", { className: "row gap-2" }, headerLogo, h("span", { className: "brand" }, "DATUM")),
    h("div", { className: "row gap-2" },
      h("button", { onClick: function () { setCalendarOpen(true); }, className: "icon-btn" }, Icon("📅", 15)),
      h("button", { onClick: function () { setSettingsOpen(true); }, className: "icon-btn" }, Icon("⚙️", 15))
    )
  );

  var dashboardBody = tab !== "dashboard" ? null : h("div", { className: "col-gap" },
    h(WeightGoalBar, { goals: goals, unit: unit, currentWeightKg: currentWeightKg, startWeightKg: startWeightKg }),
    h(CalorieCard, {
      current: totals.calories, goal: goals.calorieGoal, label: "CALORIES",
      sessionEyebrow: selectedDate === today ? "TODAY'S SESSION" : "SESSION",
      sessionLabel: viewedWorkouts.length === 0
        ? "Not logged"
        : (viewedWorkouts.length === 1 ? viewedWorkouts[0].name + " · " + viewedWorkouts[0].durationMinutes + "min" : viewedWorkouts.length + " workouts logged"),
      sessionCalories: viewedWorkouts.reduce(function (s, w) { return s + w.caloriesBurned; }, 0)
    }),
    h("div", { className: "macro-ring-grid" },
      h(MacroRing, { label: "PROTEIN", current: totals.protein, goal: macroGoals.protein, color: "var(--cyan)" }),
      h(MacroRing, { label: "CARBS", current: totals.carbs, goal: macroGoals.carbs, color: "var(--orange)" }),
      h(MacroRing, { label: "SUGAR", current: totals.sugar, goal: macroGoals.sugar, color: "var(--pink)" }),
      h(MacroRing, { label: "FAT", current: totals.fat, goal: macroGoals.fat, color: "var(--blue)" })
    ),
    h("div", { className: "row gap-2" },
      h("button", { onClick: function () { setFoodModalOpen(true); }, className: "btn-primary" }, "+ Food"),
      h("button", { onClick: function () { setWorkoutModal(true); }, className: "btn-secondary" }, "+ Train")
    ),
    h("button", { onClick: function () { setNutritionistOpen(true); }, className: "btn-nutritionist" }, "🥗 AI Nutritionist")
  );

  var foodBody = tab !== "food" ? null : h("div", { className: "col-gap" },
    MEALS.map(function (meal) {
      var entries = viewedFood.filter(function (e) { return e.meal === meal; });
      var cals = entries.reduce(function (s, e) { return s + e.calories; }, 0);
      if (entries.length === 0) {
        return h("div", { key: meal, className: "meal-card meal-card-empty" },
          h("div", { className: "row-between" },
            h("span", { className: "meal-name meal-name-empty" }, meal),
            h("span", { className: "hint" }, "Not logged")
          )
        );
      }
      return h("div", { key: meal, className: "meal-card" },
        h("div", { className: "row-between mb-2" }, h("span", { className: "meal-name" }, meal), h("span", { className: "value-mono text-lime" }, cals)),
        entries.map(function (e) {
          return h("div", { key: e.id, className: "food-entry-row", onDoubleClick: function () { removeFood(e.id); } },
            h("div", { className: "food-entry-name" }, e.name),
            h("div", { className: "hint mono-hint" }, "P " + e.protein + "g · C " + e.carbs + "g · Sugar " + e.sugar + "g · F " + e.fat + "g")
          );
        })
      );
    }),
    h("button", { onClick: function () { setFoodModalOpen(true); }, className: "btn-primary" }, "+ Add food"),
    h("button", { onClick: function () { setFoodHistoryOpen(true); }, className: "list-btn" }, "View history")
  );

  var workoutsBody = tab !== "workouts" ? null : h("div", { className: "col-gap" },
    h(WeekBarChart, { days: weekBarData }),
    h("div", { className: "day-card-grid" },
      weekDayCards.length === 0 ? h("p", { className: "hint" }, "Nothing logged yet this week.") : null,
      weekDayCards.map(function (d) {
        return h("button", { key: d.date, onClick: function () { setSelectedDate(d.date); }, className: "day-card" },
          h("div", { className: "eyebrow mb-1" }, d.isToday ? "TODAY" : formatShortDate(d.date).slice(0, 3).toUpperCase()),
          h("div", { className: "day-card-name" }, d.label),
          h("div", { className: "day-card-cal", style: { color: d.isToday ? "var(--lime)" : "var(--cyan)" } }, d.calories)
        );
      })
    ),
    weeklySummaries.length > 0 ? h("div", { className: "last-week-card" },
      h("div", { className: "row-between mb-2" },
        h("span", { className: "eyebrow" }, "LAST WEEK"),
        h("span", { className: "hint" }, weeklySummaries[weeklySummaries.length - 1].weekKey)
      ),
      h("div", { className: "row-between" },
        h("div", null,
          h("div", { className: "value-mono" }, weeklySummaries[weeklySummaries.length - 1].workoutCount + " workouts"),
          h("div", { className: "hint" }, "avg " + weeklySummaries[weeklySummaries.length - 1].avgCalories + " cal/day eaten")
        ),
        h("div", { className: "session-cal" }, weeklySummaries[weeklySummaries.length - 1].caloriesBurned + " cal")
      )
    ) : null,
    h("button", { onClick: function () { setWorkoutModal(true); }, className: "btn-primary" }, "+ Log workout"),
    h("button", { onClick: function () { setWorkoutHistoryOpen(true); }, className: "list-btn" }, "View history")
  );

  var weightBody = tab !== "weight" ? null : h("div", { className: "col-gap" },
    h("div", { className: "weight-log-row-input" },
      h("input", {
        value: weightInput, onChange: function (e) { setWeightInput(e.target.value); },
        placeholder: "Today's weight (" + unit + ")", inputMode: "decimal", className: "weight-input"
      }),
      h("button", { onClick: logWeight, className: "log-btn" }, "Log")
    ),
    h("div", { className: "weight-stat-row" },
      h("div", { className: "weight-stat-box" }, h("div", { className: "weight-stat-num" }, fmtWeight(goals.targetWeightKg, unit)), h("div", { className: "hint" }, "TARGET")),
      h("div", { className: "weight-stat-box" }, h("div", { className: "weight-stat-num" }, currentWeightKg != null ? fmtWeight(currentWeightKg, unit) : "—"), h("div", { className: "hint" }, "CURRENT")),
      h("div", { className: "weight-stat-box" }, h("div", { className: "weight-stat-num", style: { color: "var(--lime)" } }, weightSinceStart), h("div", { className: "hint" }, "SINCE START"))
    ),
    h(WeightTrendChart, { points: displayWeights }),
    displayWeights.length === 0 ? h("p", { className: "hint" }, "No weight logged yet.") : null,
    displayWeights.slice().reverse().map(function (w) {
      return h("div", { key: w.date, className: "weight-log-row" },
        h("span", { className: "hint" }, formatShortDate(w.date)),
        h("span", { className: "value-mono-bold" }, fmtWeight(w.kg, unit))
      );
    })
  );

  var pillNav = h("div", { className: "pill-nav-wrap" },
    h("div", { className: "pill-nav" },
      TABS.map(function (t) {
        return h("button", {
          key: t.key, onClick: function () { setTab(t.key); },
          className: "pill-btn" + (tab === t.key ? " pill-btn-active" : "")
        }, t.label);
      })
    )
  );

  return h("div", { className: "app-shell" + (theme === "light" ? " theme-light" : ""), style: setCssVars(p) },
    header,
    h("div", { className: "app-body", ref: appBodyRef },
      h(DateNav, { selectedDate: selectedDate, onChange: setSelectedDate }),
      dashboardBody, foodBody, workoutsBody, weightBody
    ),
    pillNav,

    foodModalOpen ? h(Modal, { title: "Log food", onClose: function () { setFoodModalOpen(false); } }, h(AddFoodFlow, { onAdd: addFood, knownFoods: knownFoods })) : null,
    workoutModal ? h(Modal, { title: "Log workout", onClose: function () { setWorkoutModal(false); } }, h(AddWorkoutForm, { onAdd: addWorkout, knownWorkouts: knownWorkouts })) : null,
    goalModalOpen ? h(Modal, { title: "Edit goals", onClose: function () { setGoalModalOpen(false); } }, h(EditGoalsForm, { goals: goals, unit: unit, onSave: function (g) { setGoals(g); setGoalModalOpen(false); } })) : null,
    calendarOpen ? h(CalendarModal, { selectedDate: selectedDate, onSelect: setSelectedDate, onClose: function () { setCalendarOpen(false); } }) : null,
    foodHistoryOpen ? h(FoodHistoryModal, { days: foodHistoryDays, onClose: function () { setFoodHistoryOpen(false); }, onSelect: function (d) { setSelectedDate(d); setFoodHistoryOpen(false); } }) : null,
    workoutHistoryOpen ? h(WorkoutHistoryModal, { days: workoutHistoryDays, weeklySummaries: weeklySummaries, otherDays: otherWorkoutDays, onClose: function () { setWorkoutHistoryOpen(false); }, onSelect: function (d) { setSelectedDate(d); setWorkoutHistoryOpen(false); } }) : null,
    nutritionistOpen ? h(NutritionistModal, { frequentFoods: pantryFoods.frequent, recentFoods: pantryFoods.recent, onClose: function () { setNutritionistOpen(false); } }) : null,
    settingsOpen ? h(Modal, { title: "Settings", onClose: function () { setSettingsOpen(false); } },
      h("div", { className: "eyebrow mb-2" }, "GOALS"),
      h("button", { onClick: function () { setSettingsOpen(false); setGoalModalOpen(true); }, className: "list-btn mb-4" }, "Edit weight, calorie & workout goals"),
      h("div", { className: "eyebrow mb-2" }, "UNITS"),
      h(Segmented, { options: [{ value: "kg", label: "KG" }, { value: "lbs", label: "LBS" }, { value: "st", label: "STONE" }], value: unit, onChange: setUnit }),
      h("div", { className: "eyebrow mb-2 mt-4" }, "APPEARANCE"),
      h("div", { className: "theme-row" },
        h("span", { className: "item-title" }, "Dark mode"),
        h("button", { onClick: function () { setTheme(theme === "dark" ? "light" : "dark"); }, className: "theme-toggle" },
          h("div", { className: "theme-toggle-knob", style: { left: theme === "dark" ? "2px" : "22px" } })
        )
      ),
      h("div", { className: "eyebrow mb-2 mt-4" }, "DATA"),
      h("div", { className: "row gap-2 mb-4" },
        h("button", { onClick: exportData, className: "btn-outline" }, "Export"),
        h("button", { onClick: function () { fileInputRef.current && fileInputRef.current.click(); }, className: "btn-outline" }, "Import")
      ),
      h("input", {
        type: "file", accept: "application/json,.json", ref: fileInputRef, style: { display: "none" },
        onChange: function (e) { var file = e.target.files && e.target.files[0]; if (file) importData(file); e.target.value = ""; }
      }),
      importMessage ? h("p", { className: "hint mb-2", style: { color: importMessage.indexOf("failed") >= 0 ? "var(--danger)" : "var(--lime)" } }, importMessage) : null,
      !useRealStorage ? h("p", { className: "hint mb-2", style: { color: "var(--orange)" } }, "This preview can't access persistent storage here, so entries won't be saved between reloads. Once hosted in a real browser, your data will save normally.") : null,
      h("button", { onClick: function () { setSettingsOpen(false); }, className: "btn-primary" }, "Done")
    ) : null
  );
}

function setCssVars(p) {
  return {
    "--bg": p.bg, "--surface": p.surface, "--border": p.border, "--text": p.text, "--subtext": p.subtext,
    "--lime": p.lime, "--cyan": p.cyan, "--orange": p.orange, "--pink": p.pink, "--blue": p.blue, "--danger": p.danger
  };
}

var rootEl = document.getElementById("root");
ReactDOM.createRoot(rootEl).render(h(Datum));

}
</script>
<script>
  tryLoadFrom(0);
</script>
</body>
</html>
