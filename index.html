<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Datum — Calorie, Workout &amp; Weight Tracker</title>

<!-- React + Babel (in-browser JSX transpile, no build step needed) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useMemo, useEffect, useRef } = React;

// ---------- tiny inline icon set (no external icon library needed) ----------
function Icon({ path, size = 18, ...props }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
      {path}
    </svg>
  );
}
const IconPlus = (p) => <Icon {...p} path={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />;
const IconHome = (p) => <Icon {...p} path={<><path d="M3 9l9-7 9 7"/><path d="M9 22V12h6v10"/><path d="M4 10v10a1 1 0 0 0 1 1h4M20 10v10a1 1 0 0 1-1 1h-4"/></>} />;
const IconUtensils = (p) => <Icon {...p} path={<><path d="M3 2v7c0 1.1.9 2 2 2s2-.9 2-2V2M5 11v11M17 2v20M17 2c-2 0-4 2-4 6s2 6 4 6"/></>} />;
const IconDumbbell = (p) => <Icon {...p} path={<><path d="M6.5 6.5l11 11M4 4l3 3M20 20l-3-3M2 8l4-4M18 18l4 4M9 15l-6-6M15 9l6 6"/></>} />;
const IconScale = (p) => <Icon {...p} path={<><path d="M12 3v18M5 8l-3 6a3 3 0 0 0 6 0zM19 8l-3 6a3 3 0 0 0 6 0zM3 8h4M17 8h4M7 21h10"/></>} />;
const IconSettings = (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></>} />;
const IconX = (p) => <Icon {...p} path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />;
const IconCamera = (p) => <Icon {...p} path={<><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></>} />;
const IconScanLine = (p) => <Icon {...p} path={<><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="3" y1="12" x2="21" y2="12"/></>} />;
const IconPen = (p) => <Icon {...p} path={<><path d="M17 3a2.85 2.85 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/></>} />;
const IconTarget = (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>} />;
const IconPencil = (p) => <Icon {...p} path={<><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4z"/></>} />;
const IconClock = (p) => <Icon {...p} path={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} />;
const IconChart = (p) => <Icon {...p} path={<><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>} />;

// ---------- helpers ----------
const uid = () => Math.random().toString(36).slice(2, 10);
const MEALS = ["Breakfast", "Lunch", "Dinner", "Snacks"];
const TABS = [
  { key: "dashboard", label: "Today", icon: IconHome },
  { key: "food", label: "Food", icon: IconUtensils },
  { key: "workouts", label: "Train", icon: IconDumbbell },
  { key: "weight", label: "Weight", icon: IconScale },
];
const KG_PER_LB = 0.453592;

function toKg(val, unit) { return unit === "kg" ? val : val * KG_PER_LB; }
function fromKg(kg, unit) { return unit === "kg" ? kg : Math.round((kg / KG_PER_LB) * 10) / 10; }
function dateKey(d = new Date()) {
  const x = new Date(d);
  x.setMinutes(x.getMinutes() - x.getTimezoneOffset());
  return x.toISOString().slice(0, 10);
}
function startOfWeek(date = new Date()) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() - d.getDay());
  return d;
}
function weekKey(date = new Date()) { return dateKey(startOfWeek(date)); }
function monthKey(date = new Date()) { return dateKey(date).slice(0, 7); }
function isLastDayOfMonth(d = new Date()) {
  const next = new Date(d);
  next.setDate(next.getDate() + 1);
  return next.getDate() === 1;
}

const STORAGE_PREFIX = "datum:";
async function loadKey(key, fallback) {
  try {
    const raw = window.localStorage.getItem(STORAGE_PREFIX + key);
    return raw ? JSON.parse(raw) : fallback;
  } catch { return fallback; }
}
async function saveKey(key, value) {
  try { window.localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(value)); } catch {}
}

// ---------- tiny dependency-free line chart ----------
function MiniLineChart({ data, dataKey: dk, labelKey }) {
  const width = 320, height = 170, pad = 28;
  if (!data || data.length < 2) return null;
  const values = data.map((d) => d[dk]);
  const min = Math.min(...values), max = Math.max(...values);
  const span = max - min || 1;
  const stepX = (width - pad * 2) / (data.length - 1);
  const points = data.map((d, i) => {
    const x = pad + i * stepX;
    const y = pad + (height - pad * 2) * (1 - (d[dk] - min) / span);
    return [x, y];
  });
  const path = points.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(" ");
  return (
    <svg width="100%" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="xMidYMid meet">
      {[0, 0.5, 1].map((f, i) => (
        <line key={i} x1={pad} x2={width - pad} y1={pad + (height - pad * 2) * f} y2={pad + (height - pad * 2) * f} stroke="#27272a" strokeWidth="1" />
      ))}
      <path d={path} fill="none" stroke="#a3e635" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
      {points.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r="3" fill="#a3e635" />)}
      {data.map((d, i) => (
        <text key={i} x={points[i][0]} y={height - 6} fontSize="9" fill="#a1a1aa" textAnchor="middle">{d[labelKey]}</text>
      ))}
    </svg>
  );
}

// ---------- shared bits ----------
function Field({ label, ...props }) {
  return (
    <div className="mb-3">
      <label className="text-xs uppercase tracking-wider text-zinc-400 font-semibold">{label}</label>
      <input {...props} className="w-full bg-white border-2 border-zinc-300 focus:border-lime-500 rounded-xl px-3 py-2.5 text-base text-black font-medium outline-none mt-1 placeholder:text-zinc-400" />
    </div>
  );
}

function Modal({ title, onClose, children }) {
  return (
    <div className="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 p-4">
      <div className="bg-zinc-900 w-full max-w-md rounded-3xl max-h-full overflow-y-auto border border-zinc-700">
        <div className="flex items-center justify-between px-5 pt-5 pb-3 sticky top-0 bg-zinc-900 border-b border-zinc-700">
          <h3 className="font-bold text-lg text-white uppercase tracking-wide">{title}</h3>
          <button onClick={onClose} className="p-1.5 rounded-full bg-zinc-700 hover:bg-zinc-600 text-white">
            <IconX size={16} />
          </button>
        </div>
        <div className="px-5 py-5">{children}</div>
      </div>
    </div>
  );
}

function Segmented({ options, value, onChange }) {
  return (
    <div className="flex bg-zinc-800 rounded-xl p-1 mb-4 border border-zinc-700">
      {options.map((opt) => (
        <button key={opt} onClick={() => onChange(opt)}
          className={`flex-1 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-1.5 transition ${value === opt ? "bg-lime-400 text-black" : "text-zinc-300"}`}>
          {opt}
        </button>
      ))}
    </div>
  );
}

function ProgressBar({ pct, color = "#a3e635" }) {
  return (
    <div className="h-2 bg-zinc-800 rounded-full overflow-hidden">
      <div className="h-full rounded-full transition-all" style={{ width: `${Math.max(0, Math.min(100, pct))}%`, backgroundColor: color }} />
    </div>
  );
}

// ---------- Goal edit form ----------
function EditGoalsForm({ goals, unit, onSave }) {
  const [targetWeight, setTargetWeight] = useState(String(fromKg(goals.targetWeightKg, unit)));
  const [calorieGoal, setCalorieGoal] = useState(String(goals.calorieGoal));
  const [workoutMinutes, setWorkoutMinutes] = useState(String(goals.workoutMinutes));
  const [workoutDays, setWorkoutDays] = useState(String(goals.workoutDays));

  function submit() {
    onSave({
      targetWeightKg: toKg(parseFloat(targetWeight) || 0, unit),
      calorieGoal: parseInt(calorieGoal) || 0,
      workoutMinutes: parseInt(workoutMinutes) || 0,
      workoutDays: Math.min(7, Math.max(1, parseInt(workoutDays) || 1)),
    });
  }

  return (
    <div>
      <Field label={`Target weight (${unit})`} value={targetWeight} onChange={(e) => setTargetWeight(e.target.value)} placeholder="0" inputMode="decimal" />
      <Field label="Daily calorie goal" value={calorieGoal} onChange={(e) => setCalorieGoal(e.target.value)} placeholder="0" inputMode="numeric" />
      <div className="grid grid-cols-2 gap-3">
        <Field label="Workout length (min)" value={workoutMinutes} onChange={(e) => setWorkoutMinutes(e.target.value)} placeholder="0" inputMode="numeric" />
        <Field label="Days per week" value={workoutDays} onChange={(e) => setWorkoutDays(e.target.value)} placeholder="0" inputMode="numeric" />
      </div>
      <button onClick={submit} className="w-full bg-lime-400 text-black rounded-xl py-3.5 font-bold text-sm mt-2">Save goals</button>
    </div>
  );
}

// ---------- Food entry: quick-add from history, manual, or scan ----------
function AddFoodFlow({ onAdd, knownFoods }) {
  const [meal, setMeal] = useState(null);
  const [mode, setMode] = useState(knownFoods.length ? "Quick add" : "Manual");
  const [name, setName] = useState("");
  const [calories, setCalories] = useState("");
  const [protein, setProtein] = useState("");
  const [carbs, setCarbs] = useState("");
  const [sugar, setSugar] = useState("");
  const [fat, setFat] = useState("");
  const [scanStep, setScanStep] = useState("idle");

  function fillFrom(food) {
    setName(food.name); setCalories(String(food.calories)); setProtein(String(food.protein));
    setCarbs(String(food.carbs)); setSugar(String(food.sugar)); setFat(String(food.fat));
    setMode("Manual");
  }

  function submit() {
    if (!name.trim() || !calories) return;
    onAdd(meal, {
      name: name.trim(), calories: parseFloat(calories) || 0, protein: parseFloat(protein) || 0,
      carbs: parseFloat(carbs) || 0, sugar: parseFloat(sugar) || 0, fat: parseFloat(fat) || 0,
    });
  }

  function mockScan(kind) {
    setScanStep("scanning");
    setTimeout(() => {
      setName(kind === "barcode" ? "Scanned product" : "Label scan result");
      setCalories("210"); setProtein("9"); setCarbs("27"); setSugar("11"); setFat("7");
      setScanStep("idle"); setMode("Manual");
    }, 900);
  }

  if (!meal) {
    return (
      <div>
        <p className="text-zinc-400 text-sm mb-3">Which meal is this for?</p>
        {MEALS.map((m) => (
          <button key={m} onClick={() => setMeal(m)} className="w-full text-left bg-zinc-800 border border-zinc-700 rounded-xl px-4 py-3.5 mb-2 text-white font-semibold">{m}</button>
        ))}
      </div>
    );
  }

  const options = knownFoods.length ? ["Quick add", "Manual", "Scan"] : ["Manual", "Scan"];

  return (
    <div>
      <button onClick={() => setMeal(null)} className="text-lime-400 text-xs font-bold uppercase mb-3">‹ {meal}</button>
      <Segmented options={options} value={mode} onChange={setMode} />

      {mode === "Quick add" && (
        <div className="max-h-72 overflow-y-auto">
          {knownFoods.map((f) => (
            <button key={f.name} onClick={() => fillFrom(f)} className="w-full text-left py-2.5 border-t border-zinc-800 first:border-t-0">
              <div className="text-sm font-semibold text-white">{f.name}</div>
              <div className="text-xs text-zinc-400">{f.calories} cal · P {f.protein}g · C {f.carbs}g · Sugar {f.sugar}g · F {f.fat}g</div>
            </button>
          ))}
        </div>
      )}

      {mode === "Scan" && (
        <div className="text-center py-4">
          {scanStep === "scanning" ? (
            <div className="text-lime-400 font-mono text-sm tracking-widest animate-pulse">READING…</div>
          ) : (
            <>
              <p className="text-zinc-400 text-sm mb-4">Not wired to a real camera or database — picks demo values you can then edit.</p>
              <button onClick={() => mockScan("barcode")} className="w-full bg-zinc-800 border border-zinc-600 rounded-xl py-3.5 mb-2.5 flex items-center justify-center gap-2 text-white font-semibold text-sm">
                <IconScanLine size={17} /> Scan barcode
              </button>
              <button onClick={() => mockScan("label")} className="w-full bg-zinc-800 border border-zinc-600 rounded-xl py-3.5 flex items-center justify-center gap-2 text-white font-semibold text-sm">
                <IconCamera size={17} /> Photo nutrition label
              </button>
            </>
          )}
        </div>
      )}

      {mode === "Manual" && (
        <div>
          <Field label="Food name" value={name} onChange={(e) => setName(e.target.value)} placeholder="e.g. Grilled chicken" />
          <div className="grid grid-cols-2 gap-3">
            <Field label="Calories" value={calories} onChange={(e) => setCalories(e.target.value)} placeholder="0" inputMode="decimal" />
            <Field label="Protein (g)" value={protein} onChange={(e) => setProtein(e.target.value)} placeholder="0" inputMode="decimal" />
            <Field label="Carbs (g)" value={carbs} onChange={(e) => setCarbs(e.target.value)} placeholder="0" inputMode="decimal" />
            <Field label="Sugar (g)" value={sugar} onChange={(e) => setSugar(e.target.value)} placeholder="0" inputMode="decimal" />
          </div>
          <Field label="Fat (g)" value={fat} onChange={(e) => setFat(e.target.value)} placeholder="0" inputMode="decimal" />
          <button onClick={submit} disabled={!name.trim() || !calories} className="w-full bg-lime-400 disabled:bg-zinc-700 disabled:text-zinc-500 text-black rounded-xl py-3.5 font-bold text-sm mt-2 flex items-center justify-center gap-2">
            <IconPen size={16} /> Add food
          </button>
        </div>
      )}
    </div>
  );
}

// ---------- Workout entry: quick-add or manual ----------
function AddWorkoutForm({ onAdd, knownWorkouts }) {
  const [mode, setMode] = useState(knownWorkouts.length ? "Quick add" : "Manual");
  const [name, setName] = useState("");
  const [duration, setDuration] = useState("");
  const [calories, setCalories] = useState("");

  function fillFrom(w) { setName(w.name); setDuration(String(w.durationMinutes)); setCalories(String(w.caloriesBurned)); setMode("Manual"); }
  function submit() {
    if (!name.trim() || !calories) return;
    onAdd({ name: name.trim(), durationMinutes: parseFloat(duration) || 0, caloriesBurned: parseFloat(calories) || 0 });
  }

  const options = knownWorkouts.length ? ["Quick add", "Manual"] : ["Manual"];

  return (
    <div>
      {knownWorkouts.length > 0 && <Segmented options={options} value={mode} onChange={setMode} />}

      {mode === "Quick add" && (
        <div className="max-h-72 overflow-y-auto mb-2">
          {knownWorkouts.map((w) => (
            <button key={w.name} onClick={() => fillFrom(w)} className="w-full text-left py-2.5 border-t border-zinc-800 first:border-t-0">
              <div className="text-sm font-semibold text-white">{w.name}</div>
              <div className="text-xs text-zinc-400">{w.durationMinutes} min · {w.caloriesBurned} cal</div>
            </button>
          ))}
        </div>
      )}

      {mode === "Manual" && (
        <div>
          <Field label="Activity name" value={name} onChange={(e) => setName(e.target.value)} placeholder="e.g. Deadlift session" />
          <div className="grid grid-cols-2 gap-3">
            <Field label="Duration (min)" value={duration} onChange={(e) => setDuration(e.target.value)} placeholder="0" inputMode="decimal" />
            <Field label="Calories burned" value={calories} onChange={(e) => setCalories(e.target.value)} placeholder="0" inputMode="decimal" />
          </div>
          <button onClick={submit} disabled={!name.trim() || !calories} className="w-full bg-lime-400 disabled:bg-zinc-700 disabled:text-zinc-500 text-black rounded-xl py-3.5 font-bold text-sm mt-2">Add workout</button>
        </div>
      )}
    </div>
  );
}

function MacroBar({ label, current, goal, color }) {
  const pct = goal > 0 ? Math.min(100, (current / goal) * 100) : 0;
  return (
    <div className="mb-3">
      <div className="flex justify-between mb-1">
        <span className="text-xs font-semibold text-zinc-300 uppercase tracking-wide">{label}</span>
        <span className="text-xs font-mono text-zinc-400">{Math.round(current)} / {goal}g</span>
      </div>
      <ProgressBar pct={pct} color={color} />
    </div>
  );
}

function GoalCard({ goals, unit, currentWeightKg, startWeightKg, sessionsThisWeek, onEdit }) {
  const currentDisplay = currentWeightKg != null ? fromKg(currentWeightKg, unit) : null;
  const targetDisplay = fromKg(goals.targetWeightKg, unit);
  const startDisplay = startWeightKg != null ? fromKg(startWeightKg, unit) : null;
  let weightPct = 0;
  if (startWeightKg != null && goals.targetWeightKg) {
    const span = startWeightKg - goals.targetWeightKg;
    if (span !== 0) weightPct = ((startWeightKg - currentWeightKg) / span) * 100;
  }
  const workoutPct = goals.workoutDays > 0 ? (sessionsThisWeek / goals.workoutDays) * 100 : 0;

  return (
    <div className="bg-zinc-900 rounded-2xl p-4 mb-4 border border-zinc-800">
      <div className="flex justify-between items-center mb-3">
        <div className="flex items-center gap-2">
          <IconTarget size={16} className="text-lime-400" />
          <span className="font-bold text-white text-sm uppercase tracking-wide">Goals</span>
        </div>
        <button onClick={onEdit} className="w-8 h-8 rounded-full bg-zinc-800 border border-zinc-700 text-zinc-300 flex items-center justify-center">
          <IconPencil size={13} />
        </button>
      </div>
      <div className="mb-4">
        <div className="flex justify-between mb-1">
          <span className="text-xs font-semibold text-zinc-300 uppercase tracking-wide">Weight</span>
          <span className="text-xs font-mono text-zinc-400">
            {currentDisplay != null ? `${currentDisplay} → ${targetDisplay} ${unit}` : `Target: ${targetDisplay} ${unit}`}
          </span>
        </div>
        {startDisplay != null ? <ProgressBar pct={weightPct} color="#a3e635" /> : <p className="text-xs text-zinc-500">Log a weight entry to start tracking progress.</p>}
      </div>
      <div className="mb-4">
        <div className="flex justify-between mb-1">
          <span className="text-xs font-semibold text-zinc-300 uppercase tracking-wide">Calories</span>
          <span className="text-xs font-mono text-zinc-400">{goals.calorieGoal} / day</span>
        </div>
      </div>
      <div>
        <div className="flex justify-between mb-1">
          <span className="text-xs font-semibold text-zinc-300 uppercase tracking-wide">Workouts this week</span>
          <span className="text-xs font-mono text-zinc-400">{sessionsThisWeek} / {goals.workoutDays} · {goals.workoutMinutes} min target</span>
        </div>
        <ProgressBar pct={workoutPct} color="#fb923c" />
      </div>
    </div>
  );
}

function SummariesModal({ weeklySummaries, monthlySummaries, onClose }) {
  return (
    <Modal title="History" onClose={onClose}>
      <div className="flex items-center gap-2 mb-2">
        <IconClock size={14} className="text-lime-400" />
        <span className="text-sm font-bold text-white uppercase tracking-wide">Weekly summaries</span>
      </div>
      {weeklySummaries.length === 0 && <p className="text-zinc-500 text-sm mb-4">None yet — generated automatically each Sunday at 11:50pm.</p>}
      {[...weeklySummaries].reverse().map((s) => (
        <div key={s.weekKey} className="bg-zinc-800 rounded-xl p-3 mb-2 text-sm">
          <div className="text-white font-semibold mb-1">Week of {s.weekKey}</div>
          <div className="text-zinc-400 text-xs">Avg cal/day: {s.avgCalories} · Workouts: {s.workoutCount} · Burned: {s.caloriesBurned} cal</div>
          <div className="text-zinc-400 text-xs">Protein {s.totalProtein}g · Carbs {s.totalCarbs}g · Sugar {s.totalSugar}g · Fat {s.totalFat}g</div>
        </div>
      ))}
      <div className="flex items-center gap-2 mt-5 mb-2">
        <IconChart size={14} className="text-lime-400" />
        <span className="text-sm font-bold text-white uppercase tracking-wide">Monthly summaries</span>
      </div>
      {monthlySummaries.length === 0 && <p className="text-zinc-500 text-sm">None yet — generated automatically on the last day of the month at 11:50pm.</p>}
      {[...monthlySummaries].reverse().map((s) => (
        <div key={s.monthKey} className="bg-zinc-800 rounded-xl p-3 mb-2 text-sm">
          <div className="text-white font-semibold mb-1">{s.monthKey}</div>
          <div className="text-zinc-400 text-xs">Avg cal/day: {s.avgCalories} · Workouts: {s.workoutCount} · Burned: {s.caloriesBurned} cal</div>
          <div className="text-zinc-400 text-xs">Protein {s.totalProtein}g · Carbs {s.totalCarbs}g · Sugar {s.totalSugar}g · Fat {s.totalFat}g</div>
        </div>
      ))}
    </Modal>
  );
}

// ---------- Main ----------
function FitTracker() {
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState("dashboard");
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [goalModalOpen, setGoalModalOpen] = useState(false);
  const [summariesOpen, setSummariesOpen] = useState(false);
  const [unit, setUnit] = useState("kg");

  const [goals, setGoals] = useState({ targetWeightKg: 75, calorieGoal: 2200, workoutMinutes: 40, workoutDays: 3 });
  const macroGoals = { protein: 150, carbs: 220, sugar: 50, fat: 70 };

  const [foodEntries, setFoodEntries] = useState([]);
  const [workouts, setWorkouts] = useState([]);
  const [weights, setWeights] = useState([]);
  const [weeklySummaries, setWeeklySummaries] = useState([]);
  const [monthlySummaries, setMonthlySummaries] = useState([]);
  const lastWeekChecked = useRef(null);
  const lastMonthChecked = useRef(null);

  const [foodModalOpen, setFoodModalOpen] = useState(false);
  const [workoutModal, setWorkoutModal] = useState(false);
  const [weightInput, setWeightInput] = useState("");

  useEffect(() => {
    (async () => {
      const [fe, wo, we, ws, ms, g, u] = await Promise.all([
        loadKey("foodEntries", []), loadKey("workouts", []), loadKey("weights", []),
        loadKey("weeklySummaries", []), loadKey("monthlySummaries", []),
        loadKey("goals", goals), loadKey("unit", "kg"),
      ]);
      setFoodEntries(fe); setWorkouts(wo); setWeights(we);
      setWeeklySummaries(ws); setMonthlySummaries(ms);
      setGoals(g); setUnit(u);
      lastWeekChecked.current = await loadKey("lastWeekSummarized", null);
      lastMonthChecked.current = await loadKey("lastMonthSummarized", null);
      setLoaded(true);
    })();
  }, []);

  useEffect(() => { if (loaded) saveKey("foodEntries", foodEntries); }, [foodEntries, loaded]);
  useEffect(() => { if (loaded) saveKey("workouts", workouts); }, [workouts, loaded]);
  useEffect(() => { if (loaded) saveKey("weights", weights); }, [weights, loaded]);
  useEffect(() => { if (loaded) saveKey("weeklySummaries", weeklySummaries); }, [weeklySummaries, loaded]);
  useEffect(() => { if (loaded) saveKey("monthlySummaries", monthlySummaries); }, [monthlySummaries, loaded]);
  useEffect(() => { if (loaded) saveKey("goals", goals); }, [goals, loaded]);
  useEffect(() => { if (loaded) saveKey("unit", unit); }, [unit, loaded]);

  function aggregate(entries, wos) {
    const totals = entries.reduce((a, e) => ({
      calories: a.calories + e.calories, protein: a.protein + e.protein,
      carbs: a.carbs + e.carbs, sugar: a.sugar + e.sugar, fat: a.fat + e.fat,
    }), { calories: 0, protein: 0, carbs: 0, sugar: 0, fat: 0 });
    const days = new Set(entries.map((e) => e.date)).size || 1;
    return {
      avgCalories: Math.round(totals.calories / days),
      totalProtein: Math.round(totals.protein), totalCarbs: Math.round(totals.carbs),
      totalSugar: Math.round(totals.sugar), totalFat: Math.round(totals.fat),
      workoutCount: wos.length, caloriesBurned: wos.reduce((s, w) => s + w.caloriesBurned, 0),
    };
  }

  useEffect(() => {
    if (!loaded) return;
    function check() {
      const now = new Date();
      const wk = weekKey(now);
      if (now.getDay() === 0 && now.getHours() === 23 && now.getMinutes() >= 50 && lastWeekChecked.current !== wk) {
        const weekStart = startOfWeek(now);
        const entries = foodEntries.filter((e) => new Date(e.date) >= weekStart);
        const wos = workouts.filter((w) => new Date(w.date) >= weekStart);
        if (entries.length || wos.length) setWeeklySummaries((prev) => [...prev, { weekKey: wk, ...aggregate(entries, wos) }]);
        lastWeekChecked.current = wk; saveKey("lastWeekSummarized", wk);
      }
      const mk = monthKey(now);
      if (isLastDayOfMonth(now) && now.getHours() === 23 && now.getMinutes() >= 50 && lastMonthChecked.current !== mk) {
        const entries = foodEntries.filter((e) => e.date.slice(0, 7) === mk);
        const wos = workouts.filter((w) => w.date.slice(0, 7) === mk);
        if (entries.length || wos.length) setMonthlySummaries((prev) => [...prev, { monthKey: mk, ...aggregate(entries, wos) }]);
        lastMonthChecked.current = mk; saveKey("lastMonthSummarized", mk);
      }
    }
    check();
    const id = setInterval(check, 30000);
    return () => clearInterval(id);
  }, [loaded, foodEntries, workouts]);

  const today = dateKey();
  const todaysFood = useMemo(() => foodEntries.filter((e) => e.date === today), [foodEntries, today]);
  const todaysWorkouts = useMemo(() => workouts.filter((w) => w.date === today), [workouts, today]);

  const totals = useMemo(() => todaysFood.reduce((a, e) => ({
    calories: a.calories + e.calories, protein: a.protein + e.protein,
    carbs: a.carbs + e.carbs, sugar: a.sugar + e.sugar, fat: a.fat + e.fat,
  }), { calories: 0, protein: 0, carbs: 0, sugar: 0, fat: 0 }), [todaysFood]);

  const knownFoods = useMemo(() => {
    const byName = new Map();
    for (const e of foodEntries) byName.set(e.name, e);
    return [...byName.values()].reverse().slice(0, 20);
  }, [foodEntries]);

  const knownWorkouts = useMemo(() => {
    const byName = new Map();
    for (const w of workouts) byName.set(w.name, w);
    return [...byName.values()].reverse().slice(0, 20);
  }, [workouts]);

  const displayWeights = weights.map((w) => ({ ...w, display: fromKg(w.kg, unit) }));
  const currentWeightKg = weights.length ? weights[weights.length - 1].kg : null;
  const startWeightKg = weights.length ? weights[0].kg : null;
  const currentDisplay = currentWeightKg != null ? fromKg(currentWeightKg, unit) : null;

  const sessionsThisWeek = useMemo(() => {
    const wk = startOfWeek();
    return workouts.filter((w) => new Date(w.date) >= wk).length;
  }, [workouts]);

  function addFood(meal, entry) {
    const now = new Date();
    setFoodEntries((prev) => [...prev, { id: uid(), meal, date: dateKey(now), timestamp: now.getTime(), ...entry }]);
    setFoodModalOpen(false);
  }
  function removeFood(id) { setFoodEntries((prev) => prev.filter((e) => e.id !== id)); }

  function addWorkout(entry) {
    const now = new Date();
    setWorkouts((prev) => [...prev, { id: uid(), date: dateKey(now), timestamp: now.getTime(), ...entry }]);
    setWorkoutModal(false);
  }
  function removeWorkout(id) { setWorkouts((prev) => prev.filter((w) => w.id !== id)); }

  function logWeight() {
    const val = parseFloat(weightInput);
    if (!val || val <= 0) return;
    const kg = toKg(val, unit);
    const now = new Date();
    setWeights((prev) => [...prev, { id: uid(), date: dateKey(now), day: dateKey(now).slice(5), kg }]);
    setWeightInput("");
  }

  if (!loaded) {
    return (
      <div className="w-full max-w-md mx-auto h-screen max-h-[800px] bg-black flex flex-col items-center justify-center rounded-3xl gap-4">
        <svg width="64" height="64" viewBox="0 0 64 64" className="animate-spin" style={{ animationDuration: "1.4s" }}>
          <circle cx="32" cy="32" r="26" fill="none" stroke="#27272a" strokeWidth="8" />
          <circle cx="32" cy="32" r="26" fill="none" stroke="#a3e635" strokeWidth="8" strokeDasharray={2 * Math.PI * 26} strokeDashoffset={2 * Math.PI * 26 * 0.3} strokeLinecap="round" transform="rotate(-90 32 32)" />
        </svg>
        <span className="text-white font-mono text-sm tracking-widest uppercase">Datum</span>
      </div>
    );
  }

  return (
    <div className="w-full max-w-md mx-auto h-screen max-h-[800px] bg-black flex flex-col font-sans rounded-3xl overflow-hidden border border-zinc-800">
      <div className="px-5 pt-6 pb-3 flex items-center justify-between border-b border-zinc-800">
        <div>
          <div className="flex items-center gap-1.5 mb-0.5">
            <svg width="14" height="14" viewBox="0 0 64 64">
              <circle cx="32" cy="32" r="26" fill="none" stroke="#27272a" strokeWidth="10" />
              <circle cx="32" cy="32" r="26" fill="none" stroke="#a3e635" strokeWidth="10" strokeDasharray={2 * Math.PI * 26} strokeDashoffset={2 * Math.PI * 26 * 0.3} strokeLinecap="round" transform="rotate(-90 32 32)" />
            </svg>
            <span className="text-xs tracking-widest text-lime-400 font-bold uppercase font-mono">Datum</span>
          </div>
          <div className="font-display text-xl text-white uppercase tracking-tight">
            {tab === "dashboard" && "Today"}
            {tab === "food" && "Food Log"}
            {tab === "workouts" && "Training"}
            {tab === "weight" && "Weight"}
          </div>
        </div>
        <div className="flex gap-2">
          <button onClick={() => setSummariesOpen(true)} className="w-9 h-9 rounded-full bg-zinc-900 border border-zinc-700 text-zinc-200 flex items-center justify-center">
            <IconClock size={16} />
          </button>
          <button onClick={() => setSettingsOpen(true)} className="w-9 h-9 rounded-full bg-zinc-900 border border-zinc-700 text-zinc-200 flex items-center justify-center">
            <IconSettings size={16} />
          </button>
        </div>
      </div>

      <div className="flex-1 overflow-y-auto px-5 pb-4 pt-4">
        {tab === "dashboard" && (
          <div>
            <div className="bg-zinc-900 rounded-3xl p-6 text-center mb-4 border border-zinc-800">
              <div className="font-mono text-5xl font-bold text-lime-400 leading-none">
                {Math.round(totals.calories)}<span className="text-2xl text-zinc-500">/{goals.calorieGoal}</span>
              </div>
              <div className="text-xs text-zinc-400 mt-1 uppercase tracking-widest">calories consumed today</div>
            </div>

            <GoalCard goals={goals} unit={unit} currentWeightKg={currentWeightKg} startWeightKg={startWeightKg} sessionsThisWeek={sessionsThisWeek} onEdit={() => setGoalModalOpen(true)} />

            <div className="bg-zinc-900 rounded-2xl p-4 mb-4 border border-zinc-800">
              <div className="flex justify-between items-center mb-3">
                <span className="font-bold text-white text-sm uppercase tracking-wide">Today's workout</span>
              </div>
              {todaysWorkouts.length === 0 ? (
                <p className="text-zinc-500 text-sm mb-3">No workout logged today.</p>
              ) : (
                <div className="mb-3">
                  {todaysWorkouts.map((w) => (
                    <div key={w.id} className="flex justify-between py-2 border-t border-zinc-800 first:border-t-0">
                      <div>
                        <div className="text-sm text-white font-medium">{w.name}</div>
                        <div className="text-xs text-zinc-400">{w.durationMinutes} min</div>
                      </div>
                      <div className="text-sm font-mono text-orange-400 self-center">{w.caloriesBurned} cal</div>
                    </div>
                  ))}
                </div>
              )}
              <button onClick={() => setWorkoutModal(true)} className="w-full bg-lime-400 text-black rounded-xl py-3 font-bold text-sm flex items-center justify-center gap-2 uppercase tracking-wide">
                <IconPlus size={16} /> Log workout
              </button>
            </div>

            <div className="bg-zinc-900 rounded-2xl p-4 mb-4 border border-zinc-800">
              <div className="flex justify-between items-center mb-3">
                <span className="font-bold text-white text-sm uppercase tracking-wide">Nutrition</span>
                <span className="text-xs font-mono text-zinc-400">{Math.round(totals.calories)} cal today</span>
              </div>
              <MacroBar label="Protein" current={totals.protein} goal={macroGoals.protein} color="#a3e635" />
              <MacroBar label="Carbs" current={totals.carbs} goal={macroGoals.carbs} color="#fb923c" />
              <MacroBar label="Sugar" current={totals.sugar} goal={macroGoals.sugar} color="#f472b6" />
              <MacroBar label="Fat" current={totals.fat} goal={macroGoals.fat} color="#60a5fa" />
              <button onClick={() => setFoodModalOpen(true)} className="w-full bg-lime-400 text-black rounded-xl py-3 font-bold text-sm flex items-center justify-center gap-2 uppercase tracking-wide mt-1">
                <IconPlus size={16} /> Log food
              </button>
            </div>
          </div>
        )}

        {tab === "food" && (
          <div>
            {MEALS.map((meal) => {
              const entries = todaysFood.filter((e) => e.meal === meal);
              const cals = entries.reduce((s, e) => s + e.calories, 0);
              return (
                <div key={meal} className="bg-zinc-900 rounded-2xl p-4 mb-3 border border-zinc-800">
                  <div className="flex justify-between mb-2">
                    <span className="font-bold text-sm text-white uppercase tracking-wide">{meal}</span>
                    <span className="text-xs font-mono text-zinc-400">{cals} cal</span>
                  </div>
                  {entries.map((e) => (
                    <div key={e.id} className="flex justify-between py-2.5 border-t border-zinc-800" onDoubleClick={() => removeFood(e.id)}>
                      <div>
                        <div className="text-sm text-white font-medium">{e.name}</div>
                        <div className="text-xs text-zinc-400">P {e.protein}g · C {e.carbs}g (sugar {e.sugar}g) · F {e.fat}g</div>
                      </div>
                      <div className="text-sm font-mono text-lime-400 self-center">{e.calories}</div>
                    </div>
                  ))}
                </div>
              );
            })}
            <button onClick={() => setFoodModalOpen(true)} className="w-full bg-lime-400 text-black rounded-2xl py-3.5 font-bold text-sm flex items-center justify-center gap-2 uppercase tracking-wide">
              <IconPlus size={16} /> Log food
            </button>
          </div>
        )}

        {tab === "workouts" && (
          <div>
            <div className="bg-zinc-900 rounded-2xl p-5 text-center mb-4 border border-zinc-800">
              <div className="font-mono text-4xl font-bold text-lime-400">{todaysWorkouts.reduce((s, w) => s + w.caloriesBurned, 0)}</div>
              <div className="text-xs text-zinc-400 uppercase tracking-widest">calories burned today</div>
            </div>
            <div className="bg-zinc-900 rounded-2xl p-4 mb-4 border border-zinc-800">
              <div className="flex justify-between mb-1">
                <span className="text-xs font-semibold text-zinc-300 uppercase tracking-wide">This week</span>
                <span className="text-xs font-mono text-zinc-400">{sessionsThisWeek} / {goals.workoutDays} sessions</span>
              </div>
              <ProgressBar pct={goals.workoutDays > 0 ? (sessionsThisWeek / goals.workoutDays) * 100 : 0} color="#fb923c" />
            </div>
            {todaysWorkouts.map((w) => (
              <div key={w.id} className="flex justify-between bg-zinc-900 rounded-2xl p-4 mb-2 border border-zinc-800" onDoubleClick={() => removeWorkout(w.id)}>
                <div>
                  <div className="font-bold text-sm text-white">{w.name}</div>
                  <div className="text-xs text-zinc-400">{w.durationMinutes} min · double-tap to remove</div>
                </div>
                <div className="text-sm font-mono text-lime-400 self-center">{w.caloriesBurned}</div>
              </div>
            ))}
            {todaysWorkouts.length === 0 && <div className="text-center text-zinc-500 text-sm mt-8 mb-4">No workouts logged today.</div>}
            <button onClick={() => setWorkoutModal(true)} className="w-full mt-2 bg-lime-400 text-black rounded-2xl py-3.5 font-bold text-sm flex items-center justify-center gap-2 uppercase tracking-wide">
              <IconPlus size={16} /> Log workout
            </button>
          </div>
        )}

        {tab === "weight" && (
          <div>
            <div className="flex gap-2 mb-4">
              <input value={weightInput} onChange={(e) => setWeightInput(e.target.value)} placeholder={`Today's weight (${unit})`} inputMode="decimal"
                className="flex-1 bg-white border-2 border-zinc-300 focus:border-lime-500 rounded-xl px-3 py-3 text-sm text-black font-medium outline-none placeholder:text-zinc-400" />
              <button onClick={logWeight} className="bg-lime-400 text-black rounded-xl px-5 font-bold text-sm uppercase">Log</button>
            </div>

            {currentDisplay !== null && (
              <div className="flex gap-2 mb-4">
                <div className="flex-1 bg-zinc-900 rounded-xl p-3 text-center border border-zinc-800">
                  <div className="font-mono font-bold text-lg text-white">{currentDisplay}</div>
                  <div className="text-xs text-zinc-400 uppercase">Current ({unit})</div>
                </div>
                <div className="flex-1 bg-zinc-900 rounded-xl p-3 text-center border border-zinc-800">
                  <div className="font-mono font-bold text-lg text-white">{(currentDisplay - displayWeights[0].display).toFixed(1)}</div>
                  <div className="text-xs text-zinc-400 uppercase">Since start</div>
                </div>
              </div>
            )}

            {displayWeights.length >= 2 && (
              <div className="bg-zinc-900 rounded-2xl p-3 border border-zinc-800 mb-4">
                <MiniLineChart data={displayWeights} dataKey="display" labelKey="date" />
              </div>
            )}

            {displayWeights.length === 0 && <div className="text-center text-zinc-500 text-sm mt-8 mb-4">No weight logged yet.</div>}

            {[...displayWeights].reverse().map((w) => (
              <div key={w.id} className="flex justify-between bg-zinc-900 rounded-xl px-4 py-3 mb-1.5 border border-zinc-800">
                <span className="text-sm text-zinc-300">{w.date}</span>
                <span className="text-sm font-mono font-bold text-white">{w.display} {unit}</span>
              </div>
            ))}
          </div>
        )}
      </div>

      <div className="flex border-t border-zinc-800 bg-black">
        {TABS.map(({ key, label, icon: TabIcon }) => (
          <button key={key} onClick={() => setTab(key)} className={`flex-1 py-3 flex flex-col items-center gap-1 ${tab === key ? "text-lime-400" : "text-zinc-500"}`}>
            <TabIcon size={19} />
            <span className="text-xs font-bold uppercase tracking-wide">{label}</span>
          </button>
        ))}
      </div>

      {foodModalOpen && (
        <Modal title="Log food" onClose={() => setFoodModalOpen(false)}>
          <AddFoodFlow onAdd={addFood} knownFoods={knownFoods} />
        </Modal>
      )}
      {workoutModal && (
        <Modal title="Log workout" onClose={() => setWorkoutModal(false)}>
          <AddWorkoutForm onAdd={addWorkout} knownWorkouts={knownWorkouts} />
        </Modal>
      )}
      {goalModalOpen && (
        <Modal title="Edit goals" onClose={() => setGoalModalOpen(false)}>
          <EditGoalsForm goals={goals} unit={unit} onSave={(g) => { setGoals(g); setGoalModalOpen(false); }} />
        </Modal>
      )}
      {summariesOpen && <SummariesModal weeklySummaries={weeklySummaries} monthlySummaries={monthlySummaries} onClose={() => setSummariesOpen(false)} />}
      {settingsOpen && (
        <Modal title="Settings" onClose={() => setSettingsOpen(false)}>
          <div className="text-xs uppercase tracking-wider text-zinc-400 font-semibold mb-2">Weight unit</div>
          <Segmented options={["kg", "lbs"]} value={unit} onChange={setUnit} />
          <p className="text-zinc-500 text-xs">Existing entries convert automatically.</p>
        </Modal>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<FitTracker />);
</script>
</body>
</html>
